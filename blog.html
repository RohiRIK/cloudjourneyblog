ess \u0026 Monitoring Foundation\n\nBefore touching anything else, you need:\n\n- **Breakglass accounts** — Named emergency accounts that bypass all Conditional Access. Don't use these daily. Test them quarterly.\n- **Alerting baseline** — What does normal look like? Capture login patterns, device health, app usage before you start blocking.\n\nThis is the unsexy phase that saves you when Phase 3 locks everyone out.\n\n### Phase 2: Security Info Registration\n\nBefore enforcing MFA, users need to register authentication methods. Set this up first:\n- **Auth methods policy** — Enable Microsoft Authenticator, FIDO2, Windows Hello for Business\n- **Temporary Access Pass** — One-time codes for users who lose hardware keys\n- **Report-only mode** — Test CA policies before enforcing\n\n### Phase 3: Block Legacy Authentication\n\nLegacy auth (SMTP auth, basic auth, POP/IMAP) is the attack surface. Block it:\n\n```\nConditional Access \u003e Assignments \u003e Cloud apps \u003e All apps\nConditions \u003e Client apps \u003e Select Exchange ActiveSync clients and Other clients\nControls \u003e Grant \u003e Block access\n```\n\nBlock legacy auth too early and you'll break:\n- Legacy application integrations\n- Service accounts with password auth only\n- Old MFA integrations that sit behind legacy protocols\n\n**What broke first:** SMTP-authenticated printer scanning and IoT device integrations. Both used basic auth with no modern auth path.\n\n### Phase 3: MFA Enforcement\n\nPhishing-resistant MFA is the goal. FIDO2 hardware keys. But hardware keys have procurement and onboarding friction:\n\n- Procurement: Buy 50 keys, distribute to Tier-1 roles (privileged users, admins)\n- Onboarding: Users need to register in-browser with Chrome/Edge (Firefox support is spotty)\n- Policy: Require phishing-resistant MFA for admin roles; offer standard MFA as fallback for general users\n\n**What broke first:** Users who lost their hardware keys. Registration flow required a new key + backup key, and the process times out fast.\n\n### Phase 4: Device Compliance (Intune Baselines)\n\nIntune security baselines + Conditional Access is where device trust lives:\n\n- **Windows baseline** — BitLocker, Windows Defender, firewall rules\n- **Device compliance policy** — Require Microsoft Entra hybrid joined OR compliant device\n- **MDE integration** — Device risk from Defender feeds CA decisions\n\n**What broke first:** Microsoft Entra hybrid join fails when:\n- Stale device objects in on-prem AD aren't cleaned up\n- Line-of-business apps still query on-prem AD only (no cloud auth path)\n- Users are co-managed (Intune + SCCM) and the policy boundary isn't clear\n\n### Phase 5: Session Controls\n\nSign-in frequency and device restrictions for existing sessions:\n- **Sign-in frequency** — Re-authenticate after X hours or when device state changes\n- **Persistent browser** — Block to prevent session cookie replay\n- **App-enforced restrictions** — Disable clipboard/file copy for unmanaged devices\n\n### Phase 6: Risk-Based Conditional Access\n\nIdentity Protection risk signals drive dynamic policies:\n\n- **High-risk sign-in** — Block or require MFA\n- **Risky user** — Force password reset\n- **Microsoft Defender for Identity** — Detect lateral movement, privilege escalation, and domain escalation attacks\n\n**What broke first:** False positives. Risky sign-in policies flagged VPN users on corporate devices because the sign-in location didn't match.\n\n### Phase 7: Network Segmentation (802.1X)\n\nWiFi authentication via 802.1X (WPA2-Enterprise) is network-level Zero Trust:\n\n- **EAP method** — EAP-TLS with certificate-based auth (vs. EAP-PEAP/MSCHAPv2)\n- **Certificate lifecycle** — SCEP or PKCS certificate profile from Intune\n- **Fallback** — WPA2-PSK for legacy devices that can't do 802.1X\n\n**What broke first:** EAP negotiation failures. Root causes:\n- Wrong EAP type configured on client vs. RADIUS\n- Server certificate missing trusted root on client\n- Server name validation mismatch (certificate SAN doesn't match RADIUS hostname)\n- Expired or revoked client/server certificates\n\n## What Actually Broke First\n\nAfter three years, here's the friction ranking:\n\n| Friction Point | Phase | Symptom |\n|---|---|---|\n| 802.1X EAP failures | Network | Users can't connect to WiFi; RADIUS shows method mismatch |\n| Device baseline conflicts | Device | Co-managed devices have conflicting policies from SCCM and Intune |\n| Legacy app breakage | Identity | LOB apps fail when legacy auth is blocked |\n| False-positive risky sign-ins | Identity | VPN users flagged as risky based on location |\n| Hardware key loss | MFA | Users lose keys, no backup, lockout |\n| Breakglass account lockout | Foundation | Breakglass account passwords expire or are not tested |\n\n## The Hard Lessons\n\n1. **Don't start with blocking.** Start with alerting and monitoring. Baseline normal before you break normal.\n\n2. **Phased enforcement, not big bang.** Each phase enables the next. Block legacy auth → enforce MFA → require device compliance → apply risk-based access.\n\n3. **802.1X is the hardest network control.** Budget double the time for 802.1X pilot. EAP-TLS certificate validation is where it fails.\n\n4. **Device trust requires clear ownership.** If you're co-managed (SCCM + Intune), define the boundary. We used Intune for cloud-native devices, SCCM for remaining on-prem managed.\n\n5. **Governance is the bottleneck.** Zero Trust fails when cross-team ownership isn't clear. Identity owns CA policies. Endpoint owns device baselines. Network owns 802.1X. Security owns MDI.\n\n## The Takeaway\n\nZero Trust isn't a project with an end date. It's an operational posture. The sequence matters: emergency access → security info registration → legacy block → MFA → device compliance → session controls → risk-based access → 802.1X.\n\nThe only thing that broke irreparably was when we tried to skip Phase 1."])</script><script>self.__next_f.push([1,"0: ed to cloud traffic\n- **Threat protection** — Anomaly detection for cloud usage\n- **Access control** — Block or restrict based on context\n\nGoogle Workspace integrates with CASB via API, not inline proxy. Google explicitly recommends API/offline CASB patterns over inline proxies — inline CASBs exist but aren't the preferred path. For most orgs, Google-native controls (DLP, Reports API, App Access Management) cover much of what you need before considering third-party CASB.\n\n### Shadow IT Discovery\n\nBefore you can block, you need to know what you're dealing with. The CASB (or Google Workspace audit logs) reveals:\n\n- **OAuth token inventory** — Which third-party apps have user-authorized access to their Google data\n- **Login activity** — Where are users authenticating from?\n- **Drive sharing** — What's being shared externally?\n- **App usage** — Which apps are accessing Google Workspace data?\n\nIn Google Workspace Admin console, go to Security \u003e API controls \u003e Access management. Review OAuth app entries — check ownership (Google-owned/internal/third-party), requested scopes, and user count. The CASB dashboard often surfaces this more visually.\n\nApps are categorized as **Trusted** (full access), **Limited** (specific Google data only), **Blocked** (no access), or the default for unconfigured apps. Mark unknown third-party apps as Blocked after reviewing scope and ownership.\n\n## The Migration Strategy\n\n### Phase 1: Discover and Categorize\n\nList every external app accessing your users' Google data. Categorize:\n- **Approved** — IT-sanctioned, security reviewed\n- **Tolerated** — Not ideal but not blocked yet\n- **Blocked** — Shadow IT, must go\n\nThe CASB dashboard usually provides this. If not, export audit logs and pivot in Excel.\n\n### Phase 2: Offer a Better Alternative\n\nUsers go to personal Gmail because the sanctioned option isn't convenient. Fix that:\n\n- **Google Workspace** — If you don't have it, get it. Every user gets company @company.com account.\n- **Shared drives** — Centralize file storage so personal Drive isn't needed\n- **SSO** — Single sign-on from Entra ID to Google Workspace removes the password burden\n\n### Phase 3: Enforce with Policy\n\nNow block. The enforcement stack, in order of impact:\n\n**1. Block personal Google accounts** — This is what actually makes personal Gmail unusable on managed devices. Configure via proxy: `X-GoogApps-Allowed-Domains: yourdomain.com`, or in Google Admin console \u003e Security \u003e Managed browser \u003e Restrict sign-in to managed accounts. This stops users from adding their personal @gmail.com account to Chrome or signing into personal Gmail on managed machines.\n\n**2. App Access Control** — In Security \u003e API controls \u003e Access management, configure apps as Trusted / Limited / Specific Google data / Blocked. This controls OAuth grants, not browser access. Set default to Blocked for unconfigured apps if you want zero tolerance.\n\n**3. Context-Aware Access** — Verify managed device before granting access to Workspace apps. Requires Endpoint Verification on desktop; mobile uses Google endpoint management (Intune, Jamf, etc.) for device signals.\n\n### Phase 4: Data Migration\n\nFor users with existing personal Gmail data that needs to come over:\n\n1. **Data import** — Admin imports personal Gmail to corporate account via Security \u003e Data export and management \u003e Data migration. Requires user authorization — they authorize their personal Gmail access. This isn't the \"Google Workspace Migrate\" tool (that's for Exchange migrations).\n2. **Takeout** — User exports personal Drive, admin migrates to Shared Drive\n3. **Calendar migration** — User exports from personal calendar, imports to corporate or shares calendar with corporate account\n\nThis takes time. Give users 30 days to migrate, then enforce.\n\n## The Enforcement Checklist\n\n| Control | Implementation | Effect |\n|---|---|---|\n| Consumer account block | X-GoogApps-Allowed-Domains header or managed browser sign-in restriction | Personal Gmail can't sign in on managed devices |\n| App Access Control | Set apps to Trusted / Limited / Blocked; default to Blocked for unconfigured | No unapproved OAuth apps |\n| Context-Aware Access | Require managed device (desktop: Endpoint Verification; mobile: endpoint management) | Unmanaged devices blocked |\n| Drive external sharing | Allowlist or trust rules for external sharing | No uncontrolled file sharing |\n| SSO | Entra ID to Google Workspace | One identity, one credential |\n\n**CAA rollout tip:** Start in **monitor mode** first. Block only after verifying compliant devices sync Endpoint Verification — Google docs warn that sync delays can incorrectly block compliant desktops.\n\n## What Actually Breaks First\n\nIn practice, this enforcement breaks these workflows:\n\n1. **User's personal phone** — They can't check corporate email on their personal Android/iOS without management installed. Solution: offer MDM enrollment or accept the limitation.\n\n2. **Third-party tools** — Users who authorized random SaaS apps lose access. Solution: pre-approve the most common ones (Zoom, Slack, etc.).\n\n3. **Contractors** — External users without managed devices. Solution: dedicated contractor accounts with limited access, or accept unmanaged access with increased monitoring.\n\n4. **Endpoint Verification sync delays** — Compliant desktops get blocked before they sync device status. Google's docs explicitly warn about this. Run in monitor mode first.\n\n5. **OAuth restrictions break integrations fast** — Zoom, Slack, calendaring add-ons, scanners, backup tools — all need explicit app access configuration or users lose functionality.\n\n6. **Delegated mailbox access** — Consumer account blocking with `X-GoogApps-Allowed-Domains` can break delegated mailbox access if the delegate's domain isn't in allowed headers.\n\n## The Takeaway\n\nYou can't uninvent personal Gmail. Your users will always have personal accounts. What you can do is make it operationally useless for work:\n\n- DLP policies block data exfiltration\n- Context-Aware Access restricts access to managed devices\n- SSO removes the password management burden\n- Structured migration moves existing data to corporate\n\nThe goal isn't to punish users who use personal accounts. It's to make the corporate alternative so seamless that personal use becomes friction for work purposes, not the other way around."])</script><script>self.__next_f.push([1,"a:[\"$\",\"$L7\",null,{\"columns\":\"2\",\"s\":{\"columns\":1},\"fillWidth\":true,\"marginBottom\":\"40\",\"gap\":\"16\",\"children\":[[\"$\",\"$L8\",\"gcp-casb-shadow-it-migration\",{\"post\":{\"metadata\":{\"title\":\"Forcing the Shadow IT Migration: Making Personal Gmail Unusable in a Managed Network\",\"subtitle\":\"\",\"publishedAt\":\"2026-04-28\",\"summary\":\"Personal Gmail inside your corporate network isn't just a compliance risk — it's a data leak waiting to happen. Here's how to use CASB policies, Context-Aware Access, and structured migration to make shadow IT unusable.\",\"image\":\"/images/blog/gcp-casb-shadow-it-migration.png\",\"images\":[],\"tag\":\"Security\",\"team\":[],\"link\":\"\"},\"slug\":\"gcp-casb-shadow-it-migration\",\"content\":\"$11\"},\"thumbnail\":true,\"direction\":\"column\"}],\"$L12\"]}]\nb:[\"$\",\"h2\",null,{\"className\":\"font-heading font-strong font-xl neutral-on-background-strong ml-l\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"balance\"},\"children\":\"Earlier posts\"}]\n13:T22c5,"])</script><script>self.__next_f.push([1,"\nIf you're running a hybrid environment — devices joined to both on-premises AD and Entra ID — you've been living in a transition state. The common wisdom is \"just migrate to Entra join\" but the reality is messier than that.\n\nThe moment you cut the hybrid link, every legacy dependency — group policy, LDAP auth, NTLM, certificate-based WiFi — becomes a blocker. You don't discover these until the migration is in progress.\n\nThis is the checklist I've built from three Entra join migrations. Resolve these before you flip the switch.\n\n## The Core Decision: Supported Path vs. Unsupported Workaround\n\nTwo paths exist:\n\n**Reset and reprovision (supported)** — Autopilot wipes the device, re-enrolls it fresh as Entra-joined. User gets a clean profile. This is Microsoft's recommended path.\n\n**In-place (unsupported workaround)** — Some teams attempt to preserve user profile by manually disconnecting from AD and registering to Entra without wiping. This is NOT a fully supported conversion path and carries risk. Profile migration tools may help, but there's no official wizard for this.\n\nThe decision framework:\n\n| Factor | Wipe and Load (Supported) | Workaround (Not Supported) |\n|---|---|---|\n| User tolerance | Fresh profile = disruption | Profile persists = less drama |\n| App compatibility | Fresh device tests apps | Existing profile tests your apps |\n| Timeline | Faster to production | Slower, more testing |\n| Help desk load | Spikes then normal | Steady, then resolve |\n\nMy rule of thumb: if your user population is comfortable with a fresh profile (or has OneDrive/Box sync), go wipe-and-load. If they have local data, custom app configs, or developer tooling that doesn't sync, test in-place first.\n\n## The Readiness Checklist\n\n### 1. Device Inventory\n\nBefore anything, know what you're working with:\n\n- **Join state** — Which devices are hybrid, which are already Entra-joined, which are still plain domain-joined\n- **OS version** — Entra join requires Windows 10 20H2+ or Windows 11. Older versions need patching or replacing\n- ** TPM version** — 2.0 required for Windows Hello for Business. Check via `Get-Tpm`\n- **BitLocker status** — Encryption keys must be escrowed to Intune or AD. Unencrypted machines block post-migration\n- **Last check-in** — Devices that haven't checked in for 30+ days are stale. Handle before migration\n\nPull this from Intune: Device \u003e Monitor \u003e Enrollment status. Cross-reference with AD DS computer objects.\n\n### 2. Licensing and Entra ID Readiness\n\nEntra join requires one of the following licensing combinations:\n- **Microsoft 365 E3/E5** — includes Entra ID P1 and Intune\n- **Business Premium** — includes Intune\n- **Entra ID P1/P2 + Intune** — standalone combinations work\n- **EMS E3/E5** — includes Intune\n\nCheck your existing tenant subscriptions. Also ensure:\n- **MDM enrollment** is scoped for your user population\n- Users have permission to join devices to Entra ID (default is all users can join; restrict via Entra ID \u003e Devices \u003e Device settings if needed)\n\n### 3. Network and Authentication\n\nThese network endpoints must be reachable from devices post-migration. Validate against the official Intune and Autopilot endpoint documentation — don't hardcode a partial list:\n\n- **Entra ID authentication**: `login.microsoftonline.com`, `login.windows.net`\n- **Device enrollment**: `enterpriseenrollment.manage.microsoft.com`, `enterpriseenrollment-s.manage.microsoft.com`\n- **Intune push and management**: `*.manage.microsoft.com`, `*.dm.microsoft.com`\n- **Windows services**: `time.windows.com`, `settings-win.data.microsoft.com`\n- **Autopilot services**: `ztd.dds.microsoft.com`, `cs.dds.microsoft.com`\n- **Windows Update**: various, per official docs\n\nTest network connectivity from an external machine before migration day.\n\n### 4. Application Dependencies\n\nThis is where most migrations die. Map your LOB apps:\n\n- **Legacy Win32 apps** — Anything installers from a file share, or that runs as a Windows service — test on the Entra-joined device first\n- **Network share access** — `\\\\server\\share` paths require either:\n  - Line-of-sight to on-prem (not always possible)\n  - Azure Files with Entra ID authentication\n  - VPN for occasional access\n- **LDAP-dependent apps** — Line-of-business apps authenticating to AD DS directly. Either cloud-enable them or accept VPN-only access\n\nThe question to ask: \"Does this app work if the machine has no on-prem domain controller contact?\"\n\n### 5. Group Policy to Intune Migration\n\nGroup Policy objects (GPOs) won't apply after Entra join. You need to convert them:\n\n| GPO Category | Intune Equivalent | Notes |\n|---|---|---|\n| Security settings | Intune Security Baselines | Start there |\n| Firewall rules | Settings Catalog \u003e Firewall | Lots of rules = messy |\n| Software installation | App assign Intune | Win32 apps, not MSI |\n| Registry tweaks | Settings Catalog \u003e Registry | Painful — minimize |\n| Startup scripts | Intune Scripts | Run as SYSTEM |\n\nStart with Microsoft's Intune Security Baselines. They're the fastest path to equivalent security posture.\n\nWhat won't convert: drive mappings, logon scripts, folder redirection. Handle those via:\n- Intune Startup Scripts\n- PowerShell scripts via Proactive Remediation\n- Or accept they're gone post-migration\n\n### 6. Conditional Access Triage\n\nYour existing CA policies probably reference \"Hybrid joined\" or \"Domain joined.\" Post-migration, those devices are neither. Recategorize:\n\n- **Compliant device** — The new baseline. If Intune sees it compliant = grant.\n- **Entra joined** — Specific to cloud-only devices.\n- **Managed** — Hybrid + MDM enrolled. Keep both categories during transition.\n\nDuring migration, use a temporary policy:\n```\nGrant access IF: Device is compliant OR MFA is completed\n```\nThen lock down post-migration to:\n```\nGrant access IF: Device is compliant\n```\n\nMaintain a break-glass account — a tenant-wide admin that bypasses CA. Store credentials offline. If CA breaks your admin out, you need recovery.\n\n### 7. Legacy Auth Detection\n\nFind what still uses legacy auth (NTLM, LDAP simple bind):\n\nRun this in your DC:\n```\nGet-WinEvent -LogName Security | Where-Object {$_.Message -match \"NTLM\"} | Select -First 50\n```\n\nIn Entra ID Protection reports:\n- Sign-ins using legacy auth (brute-force target)\n- Non-compliant device auth attempts\n\nTarget these apps first for replacement or retirement.\n\n### 8. Data and Profile Protection\n\nBefore migration day:\n\n- **OneDrive Known Folder Move** — If users store documents locally, enable and verify that Desktop/Documents/Pictures sync to OneDrive. Otherwise they lose data when the profile wipes.\n- **Local admin recovery** — Post-Entra, domain admin access is removed. Ensure Windows LAPS is configured (either cloud-managed or via Intune) so help desk can recover local admin password if needed.\n\n### 9. Pre-Sign-In Network\n\nEntra-joined devices authenticate to the cloud before desktop loads. For remote workers:\n- WiFi needs to authenticate via user Entra credentials, not machine certificates\n- VPN needs to allow traffic to `login.microsoftonline.com` and related endpoints pre-logon\n\n### 10. Post-Migration Validation\n\nAfter migration, validate:\n\n- Device shows as \"Entra joined\" in Intune device inventory\n- Intune enrollment active\n- BitLocker recovery keys accessible (Intune \u003e Device \u003e BitLocker)\n- User can sign in with Entra ID (SSO flows correctly)\n- Conditional Access grants access based on compliance\n- Network shares — if required, accessible via VPN or Azure Files\n\n## The Rollout Sequence\n\n1. **Audit** — Inventory devices, licenses, apps, network dependencies (2 weeks)\n2. **Pilot** — Wipe-and-load 5-10 users in IT, validate everything (1 week)\n3. **Wave 1** — Department-by-department migration, watch help desk (1-2 weeks)\n4. **Wave 2** — Remaining users, disable hybrid enrollment (1 week)\n5. **Post-migration** — Disable hybrid join in Entra Connect, clean up legacy auth\n\n## What Breaks First\n\nIn my experience, in this order:\n\n1. **Line-of-business apps** — The app that won't launch because it wants AD. Test every app.\n2. **Mapped drives** — `\\\\server\\share` that doesn't work post-migration. Fix Azure Files or accept VPN.\n3. **Certificate-based WiFi** — certs from on-prem CA expire. Need SCEP or cloud PKI renewal.\n4. **Printer mapping** — On-prem print servers. Fix via Universal Print or accept local-only.\n\n## The Takeaway\n\nThe migration fails not because Entra join is complicated — it fails because legacy dependencies weren't mapped. Do the audit. Test the apps. Convert GPOs before migration day.\n\nIf your org is fine with a fresh profile, wipe-and-load via Autopilot is cleaner than in-place. If users have too much local state, in-place works — but test everything twice.\n\nThe checklist above isn't optional. Skip it, and migration week becomes incident response."])</script><script>self.__next_f.push([1,"c:[\"$\",\"$L7\",null,{\"columns\":\"2\",\"s\":{\"columns\":1},\"fillWidth\":true,\"marginBottom\":\"40\",\"gap\":\"16\",\"children\":[[\"$\",\"$L8\",\"entra-join-readiness-checklist\",{\"post\":{\"metadata\":{\"title\":\"The Entra Join Readiness Checklist: Everything You Must Resolve Before Cutting the Domain Cord\",\"subtitle\":\"\",\"publishedAt\":\"2026-04-26\",\"summary\":\"Moving from hybrid Azure AD join to Entra-only join isn't a flip-a-switch decision. Here's the practical checklist of what to resolve before you cut the domain cord — and the decision framework for wipe-and-reload versus in-place migration.\",\"image\":\"/images/blog/entra-join-readiness-checklist.png\",\"images\":[],\"tag\":\"Security\",\"team\":[],\"link\":\"\"},\"slug\":\"entra-join-readiness-checklist\",\"content\":\"$13\"},\"thumbnail\":true,\"direction\":\"column\"}],\"$L14\",\"$L15\",\"$L16\",\"$L17\",\"$L18\",\"$L19\",\"$L1a\",\"$L1b\",\"$L1c\",\"$L1d\",\"$L1e\",\"$L1f\",\"$L20\",\"$L21\",\"$L22\",\"$L23\",\"$L24\",\"$L25\",\"$L26\",\"$L27\",\"$L28\",\"$L29\",\"$L2a\",\"$L2b\"]}]\nd:[\"$\",\"script\",\"script-0\",{\"src\":\"/_next/static/chunks/8ac4e8555f09f41a.js\",\"async\":true,\"nonce\":\"$undefined\"}]\ne:[\"$\",\"$L2c\",null,{\"children\":[\"$\",\"$2d\",null,{\"name\":\"Nex next_f.push([1,"\nFederating Google Workspace to Entra ID sounds straightforward — flip the switch in the admin console and suddenly your users sign in with Entra credentials. The reality is more nuanced. Here's what actually happens and how to get it right.\n\n## Why Federate at All\n\nThe value isn't just SSO. It's consolidating your identity authority. When Entra is the IdP:\n\n- **One identity** — Users exist in Entra, authenticate to Entra, access Google Workspace. No separate Google password to manage.\n- **Conditional Access** — You can apply Entra CA policies before letting users into Google. MFA requirements, session limits, risk-based access — all enforced before Google sees the request.\n- **Lifecycle** — When a user leaves Entra, they can't access Google. No orphaned accounts.\n\nThe alternative — local Google passwords with no Entra visibility — is the risk you're removing.\n\n## The Architecture\n\nTwo systems, one federation contract:\n\n```\nUser → Google Workspace (SP) → Entra ID (IdP) → SAML Response → User in Google\n```\n\n- **Entra ID** acts as the SAML Identity Provider\n- **Google Workspace** acts as the Service Consumer (via Federated Directory)\n- The glue is SAML 2.0 — standard, well-documented, but picky about configuration\n\nThe flow:\n\n1. User visits `mail.google.com` or any Google property\n2. Google detects federated domain, redirects to Entra with SAML AuthnRequest\n3. Entra prompts for authentication (password + MFA if configured)\n4. Entra returns SAML Assertion with user identity claims\n5. Google validates assertion, creates session, user lands in Google Workspace\n\nTwo flows exist: SP-initiated (user starts at Google) and IdP-initiated (user starts at Entra, gets redirected to Google). Both work post-setup.\n\n## The Setup Steps\n\n### 1. Prepare Your Domains\n\nConfirm both domains are verified in their respective consoles:\n- In Entra, your primary domain must be verified\n- In Google Admin, your domain must be listed\n\n### 2. Create the Enterprise App in Entra\n\nIn Entra ID admin center:\n- Add app \u003e Google Workspace (from the gallery)\n- Set up SSO \u003e SAML\n- **Important**: You'll populate this with values from Google in the next step — don't guess the endpoints.\n\n### 3. Configure Google SSO Profile\n\nIn Google Admin \u003e Security \u003e Authentication \u003e SSO with third-party IdP:\n- Create a new SSO profile (or use the preconfigured Microsoft Entra profile if available)\n- Copy these values from Google to Entra:\n  - **Entity ID** (from Google)\n  - **ACS URL** (from Google)\n- Then populate Entra with:\n  - **IdP Login URL**: Your Entra SSO URL\n  - **IdP Logout URL**: Your Entra logout URL\n  - **IdP Certificate**: Upload the Entra signing certificate\n\nAssign the app to pilot users/groups.\n\n### 4. Claims Mapping\n\nEntra sends these claims to Google:\n\n| Entra Claim | Google Field |\n|---|---|\n| email | Primary email |\n| givenName | First name |\n| surname | Last name |\n| NameID | Must match Google user's primary email |\n\nThe critical mapping: **NameID must match the user's primary email address in Google**. If it doesn't, sign-in fails.\n\n### 5. Provisioning (Optional But Recommended)\n\nFederation handles **authentication** — it doesn't create Google accounts. Users must exist in Google Workspace to sign in.\n\nTwo paths:\n- **Manual**: Pre-create users in Google before they authenticate\n- **Automatic**: Enable Entra provisioning to Google (via Entra ID \u003e Google app \u003e Provisioning). This syncs users from Entra to Google — create, update, disable — on a regular schedule.\n\nMost production deployments enable automatic provisioning to keep Google accounts in sync with Entra. Without it, you must manually create users in Google before they can sign in.\n\n## What Breaks First\n\n### NameID/Email Mismatch\n\nThe most common error post-setup: authentication fails at Google because the NameID claim doesn't match the user's primary email in Google.\n\nFix: Ensure the email claim from Entra matches exactly what's in the Google user's profile.\n\n### Wrong ACS or Entity ID\n\nIf the SAML endpoints are mismatched between Entra and Google, the assertion gets rejected.\n\nFix: Verify Google provides the correct ACS URL and Entity ID, and those are exactly what's configured in Entra.\n\n### Certificate Expiration\n\nEntra's SAML signing certificate expires Yearly (check your app's certificate expiry). Put a calendar reminder 30 days before. When it expires, users can't sign in until you update the certificate in Google admin.\n\n### User Not Provisioned\n\nIf a user exists in Entra but not in Google, and provisioning is disabled, authentication fails.\n\nFix: Enable automatic provisioning, or manually create users in Google before they attempt to sign in.\n\n### Not Assigned to App\n\nSometimes forgotten: the user or their group isn't assigned to the Google app in Entra.\n\nFix: Assign the app to the pilot group in Entra \u003e Enterprise App \u003e Assignments.\n\n## The Auth Flow in Plain English\n\n```\nBrowser starts at mail.google.com \n    ↓\nGoogle sees federated domain, redirects (SAML AuthnRequest) to Entra\n    ↓\nUser enters credentials at Entra (MFA triggers here if enabled)\n    ↓\nEntra validates, issues SAML Assertion with email + name + ImmutableId\n    ↓\nGoogle receives assertion, matches ImmutableId to Google user, logs in\n```\n\nThe key insight: the user never enters a Google password. Entra owns the credential entry, password complexity, MFA enforcement. Google just trusts Entra's assertion.\n\n## What You Gain\n\n| Before Federation | After Federation |\n|---|---|---|\n| Users manage Google passwords separately | Single Entra password |\n| No Entra visibility into Google access | CA policies apply before Google |\n| Orphaned Google accounts on leavers | Access cuts off when Entra disables |\n| No unified session policy | Entra controls session lifetime |\n\n## The Takeaway\n\nThe setup isn't hard — it's exacting. Get the SAML metadata right, map ImmutableId correctly, enable provisioning, and test both SP and IdP flows. Once federated, you've moved the authentication authority to Entra and consolidated your identity stack.\n\nDon't skip the test phase. Try it with one pilot user before rolling it out domain-wide."])</script><script>self.__next_f.push([1,"12:[\"$\",\"$L8\",\"google-workspace-entra-federation\",{\"post\":{\"metadata\":{\"title\":\"Google Workspace to Entra ID Federation: The SSO Setup That Actually Works\",\"subtitle\":\"\",\"publishedAt\":\"2026-04-27\",\"summary\":\"Setting up Google Workspace to use Entra ID as the Identity Provider isn't just checking a box. Here's the practical walkthrough of SAML federation, claims mapping, and what breaks when you get it wrong.\",\"image\":\"/images/blog/google-workspace-entra-federation.png\",\"images\":[],\"tag\":\"Identity\",\"team\":[],\"link\":\"\"},\"slug\":\"google-workspace-entra-federation\",\"content\":\"$3c\"},\"thumbnail\":true,\"direction\":\"column\"}]\n3d:T1ef5,"])</script><script>self.__next_f.push([1,"\nWhen a company goes from 20 to 120 employees in 18 months, HR processes break in predictable ways. New hires show up on Monday and don't have access to the tools they need. Role changes happen in the HR system but nowhere else. Offboarded employees retain access to systems for weeks because no one remembered to tell IT.\n\nThis is the story of automating those lifecycle events for a veterinary marketplace client — what we built, why, and what it looks like in practice.\n\n## The Context\n\nThe client runs a two-sided marketplace connecting pet owners with veterinarians. They're growing fast, which means:\n- Frequent hiring (new vets, engineers, sales, ops)\n- Regular promotions and role changes\n- High turnover in certain roles\n- A distributed team across three time zones\n\nTheir HR system of record is HiBob. Their IT provisioning is partially manual — a mix of manual account creation in Google Workspace, Azure AD, and various SaaS tools.\n\nThe manual process had three failure modes:\n1. **New hire misses** — someone starts and doesn't get Slack access until three days later\n2. **Offboarding gaps** — departing employees retain access to Stripe, AWS, and customer data\n3. **Role change drift** — someone gets promoted but their permissions don't update\n\nWe were brought in to automate the lifecycle events.\n\n## The Architecture\n\nThe solution has three layers:\n\n| Layer | Technology | Role |\n|-------|-----------|------|\n| Source of Truth | HiBob (via API) | HR events trigger here |\n| Orchestration | n8n | Workflow engine, event routing |\n| Targets | Google Workspace, Entra ID, Slack, Jira, 1Password | Provisioned/updated/deprovisioned |\n\nn8n listens to HiBob webhooks and routes events to the appropriate workflows. No polling — webhooks fire when something changes in HiBob.\n\n## The Workflows\n\n### 1. New Hire Onboarding\n\nWhen HiBob fires a `employee.hired` event, n8n runs the onboarding workflow:\n\n```typescript\n// Simplified flow\nonboarding({\n  employee: HireData\n}) {\n  // Step 1: Create Google Workspace account\n  await createGoogleAccount({\n    firstName: employee.firstName,\n    lastName: employee.lastName,\n    department: employee.department,\n    manager: employee.manager.email\n  });\n\n  // Step 2: Add to Entra ID with appropriate role\n  await addToEntraGroup({\n    email: employee.workEmail,\n    role: mapDepartmentToGroup(employee.department)\n  });\n\n  // Step 3: Invite to Slack workspace\n  await inviteSlackUser({\n    email: employee.workEmail,\n    channels: getDefaultChannels(employee.department)\n  });\n\n  // Step 4: Create Jira access + default project\n  await jiraProvision({\n    accountId: employee.employeeId,\n    projectRole: mapToJiraRole(employee.jobTitle)\n  });\n\n  // Step 5: Add to 1Password with team vault\n  await addTo1PasswordVault({\n    email: employee.workEmail,\n    vault: getTeamVault(employee.department)\n  });\n\n  // Step 6: Notify IT and manager via Slack DM\n  await sendSlackMessage({\n    to: employee.manager.email,\n    message: `${employee.firstName} ${employee.lastName} provisioned. Systems: GWS ✓, Entra ✓, Slack ✓, Jira ✓, 1P ✓`\n  });\n}\n```\n\nThe workflow runs in parallel where dependencies don't exist. A full onboarding now takes under 2 minutes from HiBob event to all systems configured. Previously, IT was spending 30-45 minutes per new hire doing this manually.\n\n### 2. Role Changes\n\nWhen an employee's job title, department, or manager changes in HiBob, the role change workflow fires:\n\n```typescript\nroleChange({\n  employee: Employee,\n  changes: RoleChange[]\n}) {\n  // For each system affected by the change\n  for (const change of changes) {\n    if (change.field === 'department') {\n      // Update Entra group membership\n      await removeFromEntraGroup(employee.email, getOldGroup(change.from));\n      await addToEntraGroup(employee.email, getNewGroup(change.to));\n\n      // Update Slack channels (leave old, join new)\n      await slack.leaveChannels(employee.email, getOldChannels(change.from));\n      await slack.joinChannels(employee.email, getNewChannels(change.to));\n\n      // Update Jira project access\n      await updateJiraGroups(employee.accountId, change.to);\n    }\n\n    if (change.field === 'manager') {\n      // Update reporting chain in Entra\n      await updateEntraManager(employee.email, change.newManager.email);\n\n      // Update 1Password vault access\n      await moveToNewVault(employee.email, change.newManager.vault);\n    }\n  }\n\n  // Notify new manager\n  await sendSlackMessage({\n    to: change.newManager.email,\n    message: `${employee.fullName} now reports to you. Access updated.`\n  });\n}\n```\n\nThe hardest part of role changes is knowing what to do with historical data — old Slack channels, old Jira projects, old 1Password vaults. We made the call to archive rather than delete: employees keep read access to their old team data for 30 days, then it gets removed automatically.\n\n### 3. Offboarding\n\nOffboarding is the highest-risk workflow. When HiBob fires a `employee.offboarding.started` event, we have a 14-day window before the last day to get this right:\n\n```typescript\noffboarding({\n  employee: OffboardingData,\n  scheduledDate: Date\n}) {\n  // Day 1: First notification\n  // - IT gets Slack notification with full inventory of employee access\n  // - Manager confirms expected equipment return list\n\n  // Day 7: Midpoint check\n  // - Audit that access changes have been applied\n  // - Send reminders for anything not confirmed\n\n  // Day 13: One day before\n  // - Final audit pass — all systems confirmed deprovisioned\n  // - IT gets final checklist\n\n  // Day 14 (last day): Hard deprovisioning\n  await suspendGoogleAccount(employee.email);\n  await disableEntraAccount(employee.email);\n  await.removeSlackMembership(employee.email);\n  await.revokeJiraAccess(employee.accountId);\n  await.removeFrom1Password(employee.email);\n\n  // Final confirmation sent to IT and HR\n  await sendSlackMessage({\n    channel: '#it-operations',\n    message: `${employee.fullName} fully offboarded. All systems deprovisioned as of ${today}.`\n  });\n}\n```\n\nThe staggered approach matters. Offboarding isn't a one-time event — it's a process with a timeline. We catch cases where HR marks someone as leaving but IT doesn't act for two weeks because they didn't see the notification.\n\n## Error Handling\n\nEvery workflow has a dead-letter queue. If any step fails, n8n:\n1. Retries 3 times with exponential backoff\n2. If still failing, posts to `#it-alerts` with the failure details\n3. Creates a follow-up task in a tracking system so nothing falls through\n\nCommon failure modes:\n- HiBob webhook arrives before the employee's email is fully provisioned (race condition on first day) — handled with a 5-minute delay on the initial sync\n- SaaS API rate limits — handled with built-in rate limiting in n8n\n- Concurrent events for the same employee (e.g., hire + role change on same day) — handled with idempotency keys\n\n## What It Looks Like After 6 Months\n\n| Metric | Before | After |\n|--------|--------|-------|\n| Avg time to provision new hire | 45 min (IT manual) | 2 min (automated) |\n| Offboarding completion rate | 72% within 1 week | 94% within 1 day |\n| Offboarding gaps (access retained after last day) | 8-10 per month | 1-2 per month |\n| Role change accuracy | Manual, spotty | Automated, consistent |\n| IT hours spent on provisioning per month | ~20 hours | ~2 hours |\n\n## What I'd Add Next\n\nThe current system covers the main SaaS tools. Two gaps I'd close next:\n\n**SSO audit trail.** We know when someone logs in, but not which apps they actually used. Defender for Cloud Apps gives us that visibility — we should integrate it.\n\n**Manager self-service.** Right now HR triggers everything via HiBob. A manager-facing portal for things like equipment requests and access reviews would reduce the HR ticket load further.\n\nThe workflow infrastructure is there. Adding new integrations is a matter of hours, not days."])</script><script>self.__next_f.push([1,"14:[\"$\",\"$L8\",\"hr-lifecycle-automation\",{\"post\":{\"metadata\":{\"title\":\"Automating HR Lifecycle Events for a Growing Veterinary Marketplace\",\"subtitle\":\"\",\"publishedAt\":\"2026-04-26\",\"summary\":\"Building a set of automated HR-driven workflows for a fast-growing client — onboarding, role changes, and offboarding orchestrated through HiBob and a custom middleware layer.\",\"image\":\"/images/blog/hr-lifecycle-automation.png\",\"images\":[],\"tag\":\"Automation\",\"team\":[],\"link\":\"\"},\"slug\":\"hr-lifecycle-automation\",\"content\":\"$3d\"},\"thumbnail\":true,\"direction\":\"column\"}]\n3e:T1985,"])</script><script>self.__next_f.push([1,"\nEvery client project eventually reaches the same moment: you need to move from a staging URL to a real production environment. That means real infrastructure, real domains, real security posture — the works.\n\nThis is the story of one of those moments. I'll walk through what I built, why I made the decisions I did, and what I'd do differently.\n\n## The Starting Point\n\nThe client needed a new hosting environment for their website. They'd been running on a shared hosting plan that was showing its age — slow response times, no SSL automation, no ability to customize headers, and zero visibility into traffic patterns. It was fine for a prototype. It wasn't acceptable for a live product.\n\nThe brief was simple: something fast, secure, and maintainable. Not overengineered — just solid.\n\n## Why Azure\n\nI standardise on Azure for client infrastructure for a few reasons:\n\n- The portal is well-designed and clients can actually see what they're paying for\n- WAF (Web Application Firewall) is first-party and integrates with Application Gateway\n- I already have the tooling — ARM templates, scripting, monitoring dashboards\n- Microsoft support is available if things go wrong at 2 AM\n\nThe alternative was AWS (too complex for a straightforward website), GCP (great, but I have less operational depth), or a managed platform like Netlify/Vercel (not flexible enough for the custom requirements).\n\n## The Architecture\n\nHere's what I built:\n\n| Layer | Service | Purpose |\n|-------|---------|---------|\n| Edge | Azure Application Gateway + WAF | SSL termination, DDoS protection, path routing |\n| Compute | Azure VPS (B2s) | Web server host |\n| DNS | Azure DNS | Zone management |\n| CDN | Azure CDN (optional) | Static asset acceleration |\n| Monitoring | Azure Monitor + Log Analytics | Traffic visibility |\n\nThat's it. No Kubernetes, no containers, no Terraform. A plain Linux VPS behind a WAF. Sometimes simple is the right answer.\n\n## Step 1 — Azure Application Gateway + WAF\n\nI started at the edge. The Application Gateway is the front door — it's what the outside world hits first.\n\nI configured it with:\n- **WAF mode**: Prevention (not detection — we block, not just alert)\n- **OWASP rule set 3.2**: Covers the standard exploits — SQLi, XSS, Local File Inclusion, remote code execution attempts\n- **Custom rules**: Blocked a handful of known-bad ASNs and geographies outside the client's primary markets\n- **SSL offloading**: One wildcard cert via Let's Encrypt, terminated at the gateway\n\nThe WAF gets a bad reputation for being hard to tune. It can be — but for a straightforward website, the default OWASP rule set is a good baseline. I spend about an hour reviewing the logs after go-live to tune out false positives, and it's been quiet ever since.\n\n```bash\n# Quick check on blocked requests (first week)\naz network application-gateway waf-log-analytics \\\n  --gateway-name $GW_NAME \\\n  --resource-group $RG \\\n  --query \"where Action == 'Block' | summarize count() by RequestUri, UserAgent\"\n```\n\n## Step 2 — The VPS\n\nThe web server runs on an Azure B2s VPS — 2 vCPUs, 4 GB RAM, Ubuntu 22.04 LTS. It's not going to win any benchmark contests, but it's plenty for a website that isn't serving video or large file downloads.\n\nI keep the footprint minimal:\n\n```bash\n# Only what's needed\napt install nginx certbot python3-certbot-nginx ufw\n```\n\nNo cPanel. No Plesk. Just nginx and the ability to read a config file.\n\nI automate the provisioning with a small bash script that:\n1. Spins up the VM via Azure CLI\n2. Opens only the required ports (80, 443, SSH)\n3. Installs nginx and certbot\n4. Applies a baseline hardening script (SSH key only, fail2ban, unattended-upgrades)\n\nThe script lives in a private repo and gets run once per new environment. It's not infrastructure-as-code in the formal sense, but it's reproducible and documented.\n\n## Step 3 — DNS and Routing\n\nThe Application Gateway gets a public IP. I pointed the domain's A record at it, added a CNAME for `www`, and set up an Azure DNS zone to manage everything in one place.\n\nRouting on the gateway is simple:\n\n- `/` → backend pool (VPS nginx)\n- `/api/*` → backend pool (same VPS, different nginx location block)\n- Everything else → standard nginx rewrite rules\n\nI considered adding Azure CDN for static asset caching, but the site is mostly server-rendered HTML with small assets. CDN adds complexity — DNS propagation, cache invalidation, additional costs — and the marginal benefit wasn't there. I'll revisit if traffic grows.\n\n## Step 4 — Monitoring\n\nOne thing I always add: Azure Monitor on day one, not as an afterthought.\n\nI set up:\n- **Metric alerts**: CPU \u003e 80%, disk \u003e 85%, nginx 5xx rate \u003e 10/min\n- **Log Analytics workspace**: nginx access and error logs piped in via the OMS agent\n- **Application Gateway metrics**: request count, backend latency, WAF blocked requests\n\nThe client has a dashboard link. They can see traffic patterns, blocked attacks, and server health. It's not Datadog, but it costs $3/month and covers the basics.\n\n## What I'd Do Differently\n\n**Add a staging environment earlier.** I initially deployed straight to production, which meant any config mistake was a real problem. Even a single additional VM behind the same Application Gateway as a staging slot would have made the go-live smoother.\n\n**Automate SSL renewal monitoring.** Certbot renews the cert, but I don't have an alert if the renewal fails silently. I added that after the first 90 days — better late than never.\n\n**Pre-configure the WAF in \"Detection\" mode for two weeks before switching to \"Prevention.\"** I did this manually, but it should have been in the provisioning script as a flag. Live rule tuning is easier when you have two weeks of logs to review.\n\n## The Bill\n\nA rough breakdown for a single environment:\n\n| Service | Monthly Cost |\n|---------|-------------|\n| Application Gateway (WAF) | ~$45 |\n| VPS B2s | ~$30 |\n| Azure DNS | ~$1 |\n| Log Analytics (basic) | ~$3 |\n| **Total** | **~$79/month** |\n\nThat's for a production-grade environment with WAF protection and visibility. The old shared hosting was $15/month but came with none of this.\n\n## Lessons\n\nInfrastructure for client projects doesn't need to be complex. A WAF front, a clean VM, basic monitoring — that's the baseline. Everything else is optional and should be added when there's a reason.\n\nThe trap is either over-engineering (k8s for a static site) or under-engineering (shared hosting for a production product). The right answer is boring and works."])</script><script>self.__next_f.push([1,"15:[\"$\",\"$L8\",\"new-environment-setup\",{\"post\":{\"metadata\":{\"title\":\"Spinning Up a Client's Production Environment: Azure WAF + VPS\",\"subtitle\":\"\",\"publishedAt\":\"2026-04-26\",\"summary\":\"Setting up a new hosting environment from scratch — the decisions, trade-offs, and lessons from provisioning infrastructure for a client website on Azure.\",\"image\":\"/images/blog/new-environment-setup.png\",\"images\":[],\"tag\":\"Infrastructure\",\"team\":[],\"link\":\"\"},\"slug\":\"new-environment-setup\",\"content\":\"$3e\"},\"thumbnail\":true,\"direction\":\"column\"}]\n3f:T1398,"])</script><script>self.__next_f.push([1,"\nEvery serious engineer has a lab. Not the certifications-and-home-lab kind — the kind where you test ideas before they hit production, where your side projects run on actual infrastructure instead of your laptop fan doing pushups at 3 AM.\n\nMine lives on Azure. A single VPS, a WAF in front of it, Docker Swarm underneath, and n8n doing the thinking. Here's how it all fits together and what I learned putting it together over the past year.\n\n## The Starting Point\n\nI needed somewhere to run automation workflows without spinning up a new cloud service every time. Things like:\n\n- AI blogger automation — draft posts, check them, publish them\n- Stock market data ETL — pull prices, enrich them, store them\n- GitHub activity monitoring — notify me when something interesting happens\n- Web scraping pipelines for client research\n\nAll of this was running either locally or across half a dozen separate services. I wanted one home for it all.\n\n## The Architecture\n\nThe stack is intentionally simple:\n\n| Layer | Technology | Purpose |\n|-------|-----------|---------|\n| Network | Azure WAF v2 | Front door, DDoS + filtering |\n| Compute | Azure VPS (B2s) | The actual machine |\n| Orchestration | Docker Swarm | Container management |\n| Automation | n8n | Workflow brain |\n| Storage | Local volumes + backups | Data persistence |\n\nNo Kubernetes. No Terraform. No monthly bill that makes you wince. Just a $40/month VPS doing honest work.\n\n## Docker Swarm — Why Not Kubernetes\n\nI went with Swarm instead of k8s for one reason: **simplicity**. Swarm does what I need — multi-container orchestration, rolling updates, service discovery — without the yak shaving that comes with running k8s on a single node.\n\nMy stack file looks roughly like this:\n\n```yaml\nversion: \"3.9\"\nservices:\n  n8n:\n    image: n8nio/n8n\n    ports:\n      - \"5678:5678\"\n    volumes:\n      - n8n_data:/home/node/.n8n\n    environment:\n      - N8N_BASIC_AUTH_ACTIVE=true\n      - N8N_HOST=${N8N_HOST}\n      - WEBHOOK_URL=${WEBHOOK_URL}\n    deploy:\n      replicas: 1\n      restart_policy:\n        condition: on-failure\n\n  postgres:\n    image: postgres:16\n    volumes:\n      - postgres_data:/var/lib/postgresql/data\n    environment:\n      - POSTGRES_DB=n8n\n      - POSTGRES_USER=n8n\n      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}\n\nvolumes:\n  n8n_data:\n  postgres_data:\n```\n\nThat's it. `docker stack deploy -c stack.yml lab` and everything is up.\n\n## The WAF — Azure Application Gateway\n\nThe Application Gateway sits in front of the VPS. It's doing:\n\n- **DDoS protection** (WAF tier)\n- **Path-based routing** — `/n8n` goes to the container, `/blog` to another\n- **SSL termination** — one cert, clean URLs\n- **Geo-blocking** — I blocked everything outside Europe and the US\n\nYes, it's overkill for a single VPS. But I already had it running for client work, and there's no reason to run a public-facing service without at least one layer of perimeter defense.\n\n## n8n as the Brain\n\nn8n is where all the automation lives. It's the thing that wakes up in the morning, checks my RSS feeds, scrapes a few sites, sends me a summary, and files it all away in Notion.\n\nSome of the workflows I have running:\n\n### AI Blogger Automation\n\nTriggered by a daily cron — pulls topics from a notion database, generates a draft with an AI call, reviews it, and if it passes some basic quality checks, posts it to the blog. The human-in-the-loop is still there: I review before anything goes live.\n\n### Stock ETL Pipeline\n\nConnects to a broker API, pulls end-of-day prices, enriches them with news sentiment from an external service, and writes everything to a Postgres database. Runs after market close.\n\n### GitHub Monitoring\n\nWatches a handful of repositories for new releases and issues matching specific labels. Sends a notification to my phone via a simple webhook when something relevant pops up.\n\n## What I Learned\n\n**Single-node Swarm is fine for homelabs.** The \"Swarm is deprecated\" discourse online is for people running multi-node clusters. On one machine, it just works.\n\n**Azure VPS networking is finicky.** The default NSG rules will block everything. I had to spend an embarrassing amount of time figuring out why my ports weren't forwarding. The answer: Azure's NSG is separate from the machine's firewall. Both matter.\n\n**n8n's Postgres integration is more reliable than the built-in SQLite.** I started with the default SQLite setup and lost data twice to container restart issues. Moved to Postgres and never looked back.\n\n**Backups are boring and necessary.** I run a daily cron that snapshots the volume to an Azure Blob Storage container. It's $3/month and has saved me once already.\n\n## What's Next\n\nThe lab has been running reliably for about 8 months now. The next thing I want to add is a proper monitoring stack — Grafana + Prometheus — to actually see what's happening under the hood instead of guessing.\n\nIf you have a homelab or personal automation setup, I'd love to hear what you're running. Drop a comment or reach out."])</script><script>self.__next_f.push([1,"16:[\"$\",\"$L8\",\"robot-army-personal-lab\",{\"post\":{\"metadata\":{\"title\":\"The Robot Army: My Personal Lab on Azure\",\"subtitle\":\"\",\"publishedAt\":\"2026-04-26\",\"summary\":\"How I built a personal automation platform on Azure — a VPS behind a WAF, Docker Swarm for orchestration, and n8n as the brain that ties everything together.\",\"image\":\"/images/blog/robot-army.png\",\"images\":[],\"tag\":\"Infrastructure\",\"team\":[],\"link\":\"\"},\"slug\":\"robot-army-personal-lab\",\"content\":\"$3f\"},\"thumbnail\":true,\"direction\":\"column\"}]\n40:T24de,"])</script><script>self.__next_f.push([1,"\nZero Trust is one of those frameworks that everyone talks about and few people have actually implemented end-to-end. It's easy to describe the principle — never trust, always verify — and hard to execute it across an estate that spans legacy OT systems, hybrid Active Directory, cloud workloads, and thousands of endpoints.\n\nThis is a retrospective on a 57-task Zero Trust program I ran for an energy sector client over 18 months. I'll cover what we did, what we got wrong, and what I'd do differently next time.\n\n## The Starting Point\n\nThe organization had a traditional perimeter security model: a corporate firewall, AD-joined workstations, and a VPN for remote access. It worked — until it didn't.\n\nThe triggering events were a phishing campaign that got as far as a finance workstation, a VPN breach via a contractor whose credentials had been reused on an breached external service, and a regulatory audit that flagged the lack of endpoint visibility as a finding.\n\nThe board approved a Zero Trust program. 18 months. 57 tasks. Full scope.\n\n## What We Built\n\nThe program broke down into six workstreams:\n\n| Workstream | Scope | Duration |\n|-----------|-------|---------|\n| Identity \u0026 Access | Entra ID, Conditional Access, phishing-resistant MFA | Months 1-6 |\n| Endpoint Management | MDE deployment, Intune, security baselines | Months 3-9 |\n| Network Segmentation | Microsegmentation, 802.1X wired/wireless, VLAN restructuring | Months 4-12 |\n| Device Intelligence | MDI deployment, device compliance policies | Months 6-12 |\n| Cloud Security | Defender for Cloud Apps, CASB, workload identities | Months 8-15 |\n| Monitoring \u0026 Response | Sentinel, SOC integration, alert triage playbooks | Months 10-18 |\n\nThe workstreams ran in parallel where dependencies allowed and sequentially where they didn't. Identity was always first — you can't do Zero Trust without identity as the control plane.\n\n## Identity: The Foundation\n\nWe started with Entra ID and Conditional Access. The goal was simple: every access request — regardless of where it originates — gets evaluated against identity, device compliance, and risk signals.\n\nThe first six months were brutal. The Conditional Access policy surface grew from nothing to 40+ policies covering:\n- All cloud apps require compliant device\n- Legacy authentication blocked (Basic auth, SOAP, ADAL)\n- High-privilege role holders require phishing-resistant MFA\n- Guest access limited to specific apps with data loss prevention applied\n- Sign-in risk-based policies that step up auth on anomalous behavior\n\nThe hardest part wasn't technical — it was organizational. Convincing business unit leads to accept that their device needed to be compliant before accessing SharePoint took longer than writing the policies.\n\n**What broke:** We wrote a policy that blocked legacy authentication globally, which took down a SCADA reporting tool that only supported Basic auth over HTTPS. We had to carve out an exception, add the application to a roadmap for upgrade, and monitor that carveout until it was retired. Exception management became a full-time task.\n\n## Endpoint: MDE + Intune\n\nMonths 3-9 covered endpoint deployment. We enrolled all endpoints into Intune, deployed MDE for endpoint detection and response, and applied security baselines.\n\nThe deployment order was deliberate:\n1. **Pilot group** — IT and security team first (50 machines)\n2. **VIP group** — executives and finance (100 machines)\n3. **Engineering** — software teams with developer workstations (300 machines)\n4. **General workforce** — the remaining 2,000 machines\n\nEach ring had a two-week observation window before unlocking the next. This let us catch policy conflicts (we had three application compatibility issues that required baseline adjustments) before they hit the whole organization.\n\n**What broke:** The Intune security baseline for Windows blocked a legacy ERP client that used an unsigned DLL loader. We had to relax the block, document the exception, and escalate to the application owner for a remediation timeline. Three other exceptions followed a similar pattern.\n\n## Network: 802.1X and Microsegmentation\n\nThis was the most disruptive workstream. 802.1X for wired and wireless access requires every device — including IoT and OT systems — to authenticate before getting network access.\n\nThe challenge: the organization had 15 years of flat network architecture. Printers, badge readers, SCADA interfaces, and HVAC systems all sat on the same VLANs as user workstations.\n\nWe couldn't onboard everything to 802.1X immediately. So we used a phased approach:\n\n```bash\n# Phase 1: Supplicant deployment (months 4-6)\n# Push 802.1X supplicant config to all domain-joined devices via Intune\n# Devices get provisioning packages, IT validates in pilot\n\n# Phase 2: Switch configuration (months 6-9)\n# Reconfigure access switches for 802.1X with fallback to MAB\n# MAC Authentication Bypass for devices that can't do 802.1X\n\n# Phase 3: VLAN isolation (months 9-12)\n# Move non-compliant devices to quarantine VLAN\n# Isolate OT/IoT on dedicated segments with gateway controls\n```\n\n**What broke:** A building management system that couldn't authenticate to 802.1X and had no fallback configured went dark during a switch firmware upgrade. The BMS vendor took two weeks to provide updated firmware. The building had no HVAC control for that period. It was not a quiet two weeks.\n\n## Device Intelligence: MDI\n\nMDI (Microsoft Defender for Identity) came in at month 6, after enough Entra ID and endpoint coverage was in place to give it meaningful data. The integration with Sentinel gave the SOC a unified view of identity-based attacks.\n\nThe MDI deployment surface included:\n- Domain controllers (all 12)\n- AD FS servers (4)\n- ADFS proxy servers (2)\n- Entra ID Connect servers (2)\n\nWithin 48 hours of activation, MDI flagged a password spray attack that had been running against the ADFS proxy for three days — below the threshold to trigger alerts but visible in the timeline view. We'd have missed it without MDI.\n\n## Cloud Security: Defender for Cloud Apps\n\nMonths 8-15 covered the cloud security workstream. The organization had moved significant workloads to Azure and Microsoft 365, but had no CASB visibility or data loss prevention.\n\nWe deployed Defender for Cloud Apps with:\n- App discovery for Shadow IT (found 47 unauthorized SaaS apps in use)\n- OAuth app consent policies\n- DLP policies for sensitive data classification\n- Session policies for high-risk OAuth apps\n\nThe app discovery finding was the surprise of the program. 47 unauthorized apps included three cloud storage services, two project management tools, and one social media management platform — all in use by various teams without IT approval. The legal risk of that exposure would have been significant without MDI alerting us.\n\n## Monitoring: Sentinel Integration\n\nThe final workstream was SOC integration — getting all the signals into Sentinel and writing playbooks that actually reduced alert fatigue.\n\nWe had 340 alerts at program start. After tuning, we got to 45 actionable alerts with defined playbooks. The key was ruthless prioritization: anything that couldn't result in a decision within 5 minutes went to the \"monitor and review\" bucket, not the \"SOC immediate\" bucket.\n\nPlaybook highlights:\n- **Lateral movement detection**: MDI + Sentinel correlation for NTLM relay patterns\n- **Ransomware precursor detection**: flagged mass file deletion + anomalous process launch\n- **Insider risk indicators**: unusual SharePoint download patterns triggering DLP escalation\n- **Entra sign-in anomaly response**: automated block for high-risk sign-ins with SOC notification\n\n## What I'd Do Differently\n\n**Start with identity regardless.** If I could redo the program, I'd have pushed Entra ID governance and CA policies even earlier. The identity signal is the most reliable indicator across all the other workstreams — you can do microsegmentation, device compliance, and cloud access all faster if you have strong identity controls as the foundation.\n\n**Build the exception management process before writing policies.** We invented the process as we went, which meant inconsistent handling of exceptions early on. A formal exception register with SLAs for remediation would have been cleaner.\n\n**Get OT/IoT onboarded to network monitoring earlier.** We waited until months 9-12 for OT segmentation because we thought we needed all the identity and endpoint work done first. We were wrong. We had blind spots in OT that we didn't know about until a passive OT monitoring tool showed up in month 8.\n\n**Include a tabletop exercise for the SOC before deploying MDE.** We tuned the alerts in isolation but didn't test the response playbooks until after deployment. Some of the playbook logic had gaps that would have caused delays in a real incident.\n\n## The Numbers\n\n| Metric | Start | End |\n|--------|-------|-----|\n| Endpoints with MDE | 0% | 96% |\n| Devices Intune-compliant | 12% | 89% |\n| Conditional Access policies | 0 | 47 |\n| Legacy auth attempts blocked | — | 14,000/month |\n| Unauthorized SaaS apps discovered | 47 | 0 (quarantined) |\n| MDI alerts in SOC queue | 340 | 45 |\n| Time to detect lateral movement | Unknown | \u003c 4 hours |\n\nEighteen months. 57 tasks. A meaningful reduction in attack surface.\n\nZero Trust isn't a product you buy. It's a program you build, incrementally, one control at a time."])</script><script>self.__next_f.push([1,"17:[\"$\",\"$L8\",\"zero-trust-program-energy-sector\",{\"post\":{\"metadata\":{\"title\":\"Building a Zero Trust Program: Lessons from a Large Energy Sector Deployment\",\"subtitle\":\"\",\"publishedAt\":\"2026-04-26\",\"summary\":\"What we actually did — and what broke — rolling out a full Zero Trust program across a large energy sector organization with 57 tasks across the full stack.\",\"image\":\"/images/blog/zero-trust-program-energy-sector.png\",\"images\":[],\"tag\":\"Security\",\"team\":[],\"link\":\"\"},\"slug\":\"zero-trust-program-energy-sector\",\"content\":\"$40\"},\"thumbnail\":true,\"direction\":\"column\"}]\n41:T2657,"])</script><script>self.__next_f.push([1,"\nYour SOC is not as under-equipped as it feels. You probably have Wazuh collecting logs, Microsoft Defender for Endpoint running on endpoints, and some kind of ticketing system. The problem isn't tooling — it's that those tools don't talk to each other intelligently, and your analysts spend too much time switching between them to do real security work.\n\nThe fix isn't buying a new platform. It's wiring what you have into a system that can pre-triage alerts, enrich them with context, and route the right ones to the right people automatically.\n\nThis is how to build a lean AI-assisted SOC.\n\n## The Core Problem: Alert Volume vs. Analyst Time\n\nA mid-size organization's security stack generates hundreds of alerts per day. Most of them are noise — known tooling, routine scans, misconfigured services. Your analysts know this, but they have to check every alert to know that. The result: fatigue, slow MTTR on real incidents, and talented people spending their time on things that don't matter.\n\nAI-assisted triage addresses this directly. The goal isn't to replace analysts — it's to handle the 60-80% of alerts that are obvious false positives, leaving analysts to focus on the alerts that actually require human reasoning.\n\n## How the Three Layers Fit Together\n\nThink of your SOC stack as three functional layers:\n\n- **Detection layer** — Wazuh, collecting and correlating logs from across your environment\n- **Enrichment layer** — AI reasoning over alert context to score and classify\n- **Response layer** — SOAR playbooks that execute automatically or on approval\n\nEach layer handles what it's good at. Wazuh is good at volume log collection and rule-based detection. LLMs are good at synthesizing context and scoring ambiguity. Playbooks are good at executing repetitive response actions without error.\n\nThe logical data flow is detection → enrichment → response. The typical rollout order is: first wire the integration, then add one deterministic playbook, then layer AI-generated summaries and confidence scoring on top.\n\n```\nWazuh (log aggregation + rule detection)\n    │\n    │ ← Microsoft Defender alerts via ms-graph module\n    ▼\nAI Pre-Triage (classify + score + enrich)\n    │\n    ├── Low confidence → auto-close with audit log\n    ├── Medium → analyst queue with AI-generated summary\n    └── High → escalate with Living Response Plan\n    │\n    ▼\nSOAR Playbook (automated response, human approval gate)\n```\n\n## Layer 1: Wazuh + Microsoft Defender Integration\n\nWazuh has a built-in `ms-graph` module (Wazuh 4.6+) that polls Microsoft Graph API for security alerts from Microsoft 365 Defender. The `security/alerts_v2` and `security/incidents` relationships deliver the enriched Graph alert schema — MITRE ATT\u0026CK technique mapping, related file hashes, evidence details, IOC context. This is significantly richer than the legacy `alerts` endpoint.\n\nOne thing to know: this is pull, not push. Wazuh polls every 5 minutes by default. If MDI generates an alert at 10:00 and Wazuh doesn't poll until 10:05, you have a 5-minute detection delay. For most SOCs this is fine. If you need sub-minute latency on critical alerts, you'd need a different architecture.\n\nMicrosoft Graph sign-in logs have a documented ingestion delay of up to 15 minutes. If you're pulling `auditLogs/signIns`, set a longer `time_delay` value (e.g., `15m`) or you'll silently skip sign-in events that exist but haven't been indexed yet.\n\nThe OAuth app registration uses app-only permissions (client credentials flow) with admin consent. Create the app registration in Microsoft Entra — not in the Defender portal. The minimum permissions depend on what you're ingesting:\n- `SecurityAlert.Read.All` — for `alerts_v2`\n- `SecurityIncident.Read.All` — for `incidents`\n- `AuditLog.Read.All` — if you're also pulling `auditLogs/signIns`\n\nAn abridged ms-graph configuration (Wazuh 4.6+) looks like this — full working config will vary by version and tenant:\n\n```xml\n\u003cms-graph\u003e\n    \u003cenabled\u003eyes\u003c/enabled\u003e\n    \u003crun_on_start\u003eyes\u003c/run_on_start\u003e\n    \u003cinterval\u003e5m\u003c/interval\u003e\n    \u003capi_auth\u003e\n        \u003cclient_id\u003eyour_app_id\u003c/client_id\u003e\n        \u003ctenant_id\u003eyour_tenant_id\u003c/tenant_id\u003e\n        \u003csecret_value\u003eyour_secret_value\u003c/secret_value\u003e\n    \u003c/api_auth\u003e\n    \u003cresource\u003e\n        \u003cname\u003esecurity\u003c/name\u003e\n        \u003crelationship\u003ealerts_v2\u003c/relationship\u003e\n        \u003crelationship\u003eincidents\u003c/relationship\u003e\n    \u003c/resource\u003e\n\u003c/ms-graph\u003e\n```\n\nOne thing to know: this is a pull model. End-to-end visibility depends on polling interval plus Microsoft-side event availability. For sign-in logs in particular, add `time_delay` to reduce the risk of querying before events are indexed.\n\n## Layer 2: AI-Assisted Alert Triage\n\nAI triage answers four questions for every incoming alert:\n\n1. What happened?\n2. Why does it matter relative to our environment?\n3. What evidence supports it?\n4. What do I do next?\n\nThe practical implementation uses a RAG (Retrieval Augmented Generation) pattern. When an alert fires, the system:\n1. Collects related telemetry — endpoint events around the same time window, identity signals, network logs\n2. Correlates with asset criticality — is this a Tier 1 server or a build server?\n3. Checks threat intelligence — VirusTotal, AbuseIPDB, AlienVault OTX\n4. Generates a confidence score and a pre-built investigation summary (the \"Living Response Plan\")\n\nThe output that reaches the analyst isn't a raw alert — it's a structured brief: here's what fired, here's the asset, here's the context, here's the recommended action.\n\nWhat I've found in practice: the biggest win is usually collapsing five consoles into one triage view. Rather than context-switching between Wazuh, Defender, the email gateway, and the ticketing system, the analyst gets one summary that pulls the relevant signals from each. That's what moves MTTR, not the model being smarter than a human.\n\nThe critical thing to understand: LLMs don't \"understand\" attacks. They pattern-match against training data and synthesize context. They excel at noise reduction and bringing related signals together. On novel attack patterns, they fail. Human analysts are still required for anything that genuinely breaks the pattern.\n\nIn practice, the model writes the summary and rationale, but the confidence score should come from deterministic features — alert severity, asset criticality, IOC hits, user risk level, campaign clustering. Log the prompt context, model output, and analyst disposition for auditability and tuning.\n\n**What to let AI handle:**\n- Phishing email analysis (URL parsing, domain reputation, attachment hash lookups)\n- Failed login clustering (aggregate 50 failed logins into one grouped alert)\n- Password spray detection triage\n- Routine vulnerability scan alert enrichment\n- Shift handover summaries\n\n**What to keep human-only:**\n- Ransomware containment (irreversible)\n- Account deletion\n- Domain blocking\n- Anything requiring legal evidence preservation\n\n## Layer 3: SOAR Playbooks\n\nThe playbook layer handles repetitive response actions. The minimum viable playbook — the kind you can build in an afternoon with Shuffle or even a Python script — handles the phishing response workflow:\n\n```\n1. Extract: sender email, subject, URLs, attachments, headers\n2. Enrich: VirusTotal hash check, domain reputation, sender domain age, SPF/DKIM/DMARC status\n3. Classify:\n   - High confidence (all indicators bad) → auto-quarantine matching messages, hold sender/domain blocking for analyst approval\n   - Medium confidence (mixed signals) → queue for Tier 1 review\n   - Low confidence (nothing conclusive) → generate analyst brief, no action\n4. Notify: Slack/Teams alert with verdict + IOCs\n5. Document: audit trail entry (what, when, outcome)\n```\n\nThe key distinction: message-scoped actions (quarantine a specific email, tag a ticket) are automatable because their blast radius is contained. Sender/domain blocking and user suspension affect the entire tenant — those always go through the approval gate.\n\nThe enrichment phase is where most playbook value comes from. A VirusTotal check that would take an analyst 3 minutes happens in 200ms. A domain reputation lookup that requires context-switching to a different tool happens automatically.\n\nEvery playbook needs an approval gate for high-impact actions. The playbook shouldn't auto-disable a user account or block a domain without a human confirming first. Build it like this:\n\n```\nIF action == \"disable_user\" OR action == \"block_domain\":\n    PAUSE\n    SEND_APPROVAL_REQUEST(analyst, action_details)\n    IF analyst APPROVES:\n        EXECUTE\n    ELSE:\n        LOG(\"action denied by analyst\")\n        ESCALATE\n```\n\nThe best teams measure playbook success with: alert volume reduction over time, MTTR for critical alerts, and false positive rate. If your false positive rate isn't dropping as you tune, your detection rules need work — not more automation.\n\n## What This Actually Costs\n\nThe tooling stack above — Wazuh, Microsoft Defender, Shuffle (self-hosted, open-source) — is either free or already in your existing Microsoft licensing. The real cost is detection engineering time: writing the rules, tuning the thresholds, building the playbooks, and training the analysts to work with AI-generated briefs instead of raw alerts.\n\nThat's not a software cost. It's a process cost. And it's the part that most teams underestimate when they buy a SOAR platform and expect it to solve their alert fatigue.\n\n## The Takeaway\n\nKeep detections deterministic. Keep high-impact actions gated behind human approval. Use AI to compress the time your analysts spend context-switching — not to replace their judgment.\n\nThe teams that get this right start small, measure everything, and expand only when the previous step is working."])</script><script>self.__next_f.push([1,"18:[\"$\",\"$L8\",\"ai-driven-soc-assistant\",{\"post\":{\"metadata\":{\"title\":\"AI-Driven SOC: Layering Intelligence on Top of What You Already Own\",\"subtitle\":\"\",\"publishedAt\":\"2026-04-25\",\"summary\":\"Most SOC teams don't need a new platform — they need the tools they already have to work together smarter. Here's how to build an AI-assisted security operations capability using Wazuh, Microsoft Defender, and lightweight automation.\",\"image\":\"/images/blog/ai-driven-soc-assistant.png\",\"images\":[],\"tag\":\"Security\",\"team\":[],\"link\":\"\"},\"slug\":\"ai-driven-soc-assistant\",\"content\":\"$41\"},\"thumbnail\":true,\"direction\":\"column\"}]\n42:T400a,"])</script><script>self.__next_f.push([1,"\nWhen your compliance posture has to span Windows, macOS, and Linux, most teams end up with fragmented tooling, inconsistent logic, and no real enforcement teeth. They check a box on Monday and pretend the problem is solved.\n\nThe OT Security Client needed something different. They had a zero trust compliance requirement that actually had to land — across engineering workstations, OT operator stations, and back-office servers — with enforcement that could trigger automatically, not just report that something was wrong.\n\nThis is how we built that system.\n\n## The Problem with Compliance as Documentation\n\nMost compliance tooling is retrospective. You run a scan, you get a report, someone reviews it, and maybe — weeks later — something gets remediated. In fast-moving OT environments, that lag is unacceptable. A non-compliant workstation on the production floor isn't an audit finding. It's a potential safety incident.\n\nThe requirement was explicit: **compliance enforcement, not compliance reporting**. Devices that don't meet the baseline shouldn't be able to access corporate resources. And \"corporate resources\" here meant everything from SharePoint to engineering tooling to the OT network segments themselves.\n\nThe stack we were working with:\n- **Windows** — Intune + custom PowerShell compliance scripts\n- **macOS** — Kandji blueprint compliance connector\n- **Linux** — custom bash compliance checks\n- **Security stack** — CrowdStrike Falcon (all platforms) + Netskope (all platforms)\n\nThe goal was a single enforcement model that could apply across all three OS families, with a tiered response: grace period with warnings first, then hard blocks.\n\n## Windows: Intune Custom Compliance Scripts\n\nOn Windows, the enforcement mechanism is Intune's custom compliance policy. Microsoft gives you the policy framework; you supply the discovery logic.\n\nFor CrowdStrike Falcon, we needed to verify two things: that the agent was installed and running, and that it was configured for the correct CID (CrowdStrike Customer ID). Just checking for the service isn't enough — a disabled or misconfigured agent still shows as \"installed.\" Note that this checks tenant binding, not active cloud reporting or recent heartbeat; for full telemetry validation you'd need vendor API-side checks.\n\nHere's the discovery script pattern we used:\n\n```powershell\n# Get Falcon sensor status\n$FalconService = Get-Service -Name CSFalconService -ErrorAction SilentlyContinue\n$FalconRunning = $null -ne $FalconService -and $FalconService.Status -eq 'Running'\n\n# Get Falcon sensor CID — path and method vary by Falcon version;\n# validate in your environment. Example using falconctl if available:\ntry {\n    $FalconCID = \u0026 \"C:\\Program Files\\CrowdStrike\\falconctl.exe\" get --cid 2\u003e$null\n    if (-not $FalconCID) {\n        # Fallback: read from registry (verify path in your Falcon version)\n        $FalconRegistry = Get-ItemProperty -Path 'HKLM:\\SYSTEM\\CrowdStrike\\{9b03c1d8-50a6-4c0a-a2b0-9d0e36b6c0d}' -ErrorAction SilentlyContinue\n        if ($FalconRegistry) {\n            $FalconCID = $FalconRegistry.DefaultPivotTenantCID\n        }\n    }\n} catch {}\n$FalconCID = $FalconCID | Where-Object { $_ -ne $null } | Select-Object -First 1\n\n# Expected CID for this tenant\n$ExpectedCID = \"XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX\"\n\n$Compliant = $FalconRunning -and $FalconCID -eq $ExpectedCID\n\nreturn @{\n    FalconRunning = $FalconRunning\n    FalconCID = $FalconCID\n    Compliant = $Compliant\n} | ConvertTo-Json -Compress\n```\n\nThe JSON definition that pairs with this script defines what \"compliant\" means for Intune's evaluation engine:\n\n```json\n{\n  \"Rules\": [\n    {\n      \"SettingName\": \"Compliant\",\n      \"Operator\": \"IsEquals\",\n      \"DataType\": \"Boolean\",\n      \"Operand\": true,\n      \"MoreInfoUrl\": \"https://claroty.com\",\n      \"RemediationStrings\": [\n        {\n          \"Language\": \"en_US\",\n          \"Title\": \"CrowdStrike Falcon Not Compliant\",\n          \"Description\": \"This device is not running Falcon or is not bound to the correct tenant. Contact IT.\"\n        }\n      ]\n    }\n  ]\n}\n```\n\nFor Netskope, the pattern is similar — check that the Netskope Client service is running and that the tenant URL is configured correctly. We combined both into a single compliance script per platform to minimize policy overhead.\n\n## macOS: Kandji Blueprint Compliance Connector\n\nKandji is the Mac MDM of choice for this environment. Unlike Intune's custom script model, Kandji has a built-in compliance connector that maps directly to its blueprint system. You define compliance items as part of a blueprint, assign the blueprint to devices, and Kandji handles the evaluation loop — no custom scripts required for native checks.\n\n### The Compliance Item Stack\n\nThe key compliance items for this deployment:\n\n- **CrowdStrike Falcon for macOS** — Kandji's library includes a built-in device compliance check for Falcon, which verifies the sensor is installed and running. But like Windows, we needed to validate that it was reporting to the correct CID. Kandji calls this a **custom compliance item** — you write a shell script that returns a pass/fail, Kandji evaluates it on-device, and the result becomes a compliance signal you can use in assignment logic.\n- **Netskope Client** — Custom compliance item, same pattern as Falcon: script checks that the Netskope service is running and the tenant URL is configured correctly.\n- **FileVault encryption** — Built-in Kandji library item. Enable it, set the recovery key escrow to Kandji (not Jamf or a local escrow), and you're done.\n- **Screen lock policy** — Built-in: 5-minute timeout, require password after sleep or screen saver.\n\n#
