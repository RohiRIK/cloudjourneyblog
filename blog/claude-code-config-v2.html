xWidth\":\"m\",\"paddingY\":\"8\",\"paddingX\":\"16\",\"gap\":\"16\",\"horizontal\":\"between\",\"vertical\":\"center\",\"s\":{\"direction\":\"column\",\"horizontal\":\"center\",\"align\":\"center\"},\"children\":[[\"$\",\"span\",null,{\"className\":\"font-body font-default font-s neutral-on-background-strong\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":[[\"$\",\"span\",null,{\"className\":\"neutral-on-background-weak\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":[\"© \",2026,\" /\"]}],[\"$\",\"span\",null,{\"className\":\"px-4\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":\"Rohi Rikman\"}],[\"$\",\"span\",null,{\"className\":\"neutral-on-background-weak\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":\"/ Powered by caffeine and questionable life choices\"}]]}],[\"$\",\"$L18\",null,{\"gap\":\"16\",\"children\":[[\"$\",\"$L19\",\"GitHub\",{\"href\":\"https://github.com/RohiRIK\",\"icon\":\"github\",\"tooltip\":\"GitHub\",\"size\":\"s\",\"variant\":\"ghost\"}],[\"$\",\"$L19\",\"LinkedIn\",{\"href\":\"https://www.linkedin.com/in/rohi-rikman-48831b239/\",\"icon\":\"linkedin\",\"tooltip\":\"LinkedIn\",\"size\":\"s\",\"variant\":\"ghost\"}],[\"$\",\"$L19\",\"Email\",{\"href\":\"mailto:rohi@rohirikman.dev\",\"icon\":\"email\",\"tooltip\":\"Email\",\"size\":\"s\",\"variant\":\"ghost\"}]]}]]}],[\"$\",\"$L18\",null,{\"height\":\"80\",\"hide\":true,\"s\":{\"hide\":false}}]]}]\n"])</script><script>self.__next_f.push([1,"24:T1842,"])</script><script>self.__next_f.push([1,"\nWe spent three years rolling out Zero Trust at a defense technology company. 57 tasks later, here's what actually worked — and what broke in production.\n\n## The Implementation Sequence\n\nZero Trust isn't a product you buy. It's a sequence of controls you enforce, in order, with each phase creating the foundation for the next.\n\n### Phase 1: Emergency Access \u0026 Monitoring Foundation\n\nBefore touching anything else, you need:\n\n- **Breakglass accounts** — Named emergency accounts that bypass all Conditional Access. Don't use these daily. Test them quarterly.\n- **Alerting baseline** — What does normal look like? Capture login patterns, device health, app usage before you start blocking.\n\nThis is the unsexy phase that saves you when Phase 3 locks everyone out.\n\n### Phase 2: Security Info Registration\n\nBefore enforcing MFA, users need to register authentication methods. Set this up first:\n- **Auth methods policy** — Enable Microsoft Authenticator, FIDO2, Windows Hello for Business\n- **Temporary Access Pass** — One-time codes for users who lose hardware keys\n- **Report-only mode** — Test CA policies before enforcing\n\n### Phase 3: Block Legacy Authentication\n\nLegacy auth (SMTP auth, basic auth, POP/IMAP) is the attack surface. Block it:\n\n```\nConditional Access \u003e Assignments \u003e Cloud apps \u003e All apps\nConditions \u003e Client apps \u003e Select Exchange ActiveSync clients and Other clients\nControls \u003e Grant \u003e Block access\n```\n\nBlock legacy auth too early and you'll break:\n- Legacy application integrations\n- Service accounts with password auth only\n- Old MFA integrations that sit behind legacy protocols\n\n**What broke first:** SMTP-authenticated printer scanning and IoT device integrations. Both used basic auth with no modern auth path.\n\n### Phase 3: MFA Enforcement\n\nPhishing-resistant MFA is the goal. FIDO2 hardware keys. But hardware keys have procurement and onboarding friction:\n\n- Procurement: Buy 50 keys, distribute to Tier-1 roles (privileged users, admins)\n- Onboarding: Users need to register in-browser with Chrome/Edge (Firefox support is spotty)\n- Policy: Require phishing-resistant MFA for admin roles; offer standard MFA as fallback for general users\n\n**What broke first:** Users who lost their hardware keys. Registration flow required a new key + backup key, and the process times out fast.\n\n### Phase 4: Device Compliance (Intune Baselines)\n\nIntune security baselines + Conditional Access is where device trust lives:\n\n- **Windows baseline** — BitLocker, Windows Defender, firewall rules\n- **Device compliance policy** — Require Microsoft Entra hybrid joined OR compliant device\n- **MDE integration** — Device risk from Defender feeds CA decisions\n\n**What broke first:** Microsoft Entra hybrid join fails when:\n- Stale device objects in on-prem AD aren't cleaned up\n- Line-of-business apps still query on-prem AD only (no cloud auth path)\n- Users are co-managed (Intune + SCCM) and the policy boundary isn't clear\n\n### Phase 5: Session Controls\n\nSign-in frequency and device restrictions for existing sessions:\n- **Sign-in frequency** — Re-authenticate after X hours or when device state changes\n- **Persistent browser** — Block to prevent session cookie replay\n- **App-enforced restrictions** — Disable clipboard/file copy for unmanaged devices\n\n### Phase 6: Risk-Based Conditional Access\n\nIdentity Protection risk signals drive dynamic policies:\n\n- **High-risk sign-in** — Block or require MFA\n- **Risky user** — Force password reset\n- **Microsoft Defender for Identity** — Detect lateral movement, privilege escalation, and domain escalation attacks\n\n**What broke first:** False positives. Risky sign-in policies flagged VPN users on corporate devices because the sign-in location didn't match.\n\n### Phase 7: Network Segmentation (802.1X)\n\nWiFi authentication via 802.1X (WPA2-Enterprise) is network-level Zero Trust:\n\n- **EAP method** — EAP-TLS with certificate-based auth (vs. EAP-PEAP/MSCHAPv2)\n- **Certificate lifecycle** — SCEP or PKCS certificate profile from Intune\n- **Fallback** — WPA2-PSK for legacy devices that can't do 802.1X\n\n**What broke first:** EAP negotiation failures. Root causes:\n- Wrong EAP type configured on client vs. RADIUS\n- Server certificate missing trusted root on client\n- Server name validation mismatch (certificate SAN doesn't match RADIUS hostname)\n- Expired or revoked client/server certificates\n\n## What Actually Broke First\n\nAfter three years, here's the friction ranking:\n\n| Friction Point | Phase | Symptom |\n|---|---|---|\n| 802.1X EAP failures | Network | Users can't connect to WiFi; RADIUS shows method mismatch |\n| Device baseline conflicts | Device | Co-managed devices have conflicting policies from SCCM and Intune |\n| Legacy app breakage | Identity | LOB apps fail when legacy auth is blocked |\n| False-positive risky sign-ins | Identity | VPN users flagged as risky based on location |\n| Hardware key loss | MFA | Users lose keys, no backup, lockout |\n| Breakglass account lockout | Foundation | Breakglass account passwords expire or are not tested |\n\n## The Hard Lessons\n\n1. **Don't start with blocking.** Start with alerting and monitoring. Baseline normal before you break normal.\n\n2. **Phased enforcement, not big bang.** Each phase enables the next. Block legacy auth → enforce MFA → require device compliance → apply risk-based access.\n\n3. **802.1X is the hardest network control.** Budget double the time for 802.1X pilot. EAP-TLS certificate validation is where it fails.\n\n4. **Device trust requires clear ownership.** If you're co-managed (SCCM + Intune), define the boundary. We used Intune for cloud-native devices, SCCM for remaining on-prem managed.\n\n5. **Governance is the bottleneck.** Zero Trust fails when cross-team ownership isn't clear. Identity owns CA policies. Endpoint owns device baselines. Network owns 802.1X. Security owns MDI.\n\n## The Takeaway\n\nZero Trust isn't a project with an end date. It's an operational posture. The sequence matters: emergency access → security info registration → legacy block → MFA → device compliance → session controls → risk-based access → 802.1X.\n\nThe only thing that broke irreparably was when we tried to skip Phase 1."])</script><script>self.__next_f.push([1,"5:[\" mmary\":\"A multi-year Zero Trust program across MDE, Intune baselines, Conditional Access, phishing-resistant MFA, 802.1X, and MDI. Here's what we implemented, in what order, and what broke first.\",\"image\":\"/images/blog/zero-trust-retrospective.png\",\"images\":[],\"tag\":\"Security\",\"team\":[],\"link\":\"\"},\"slug\":\"zero-trust-retrospective\",\"content\":\"$24\"},\"thumbnail\":true,\"direction\":\"column\"}],\"$L25\"]}]]}],\"$L26\"]}]}],\"$L27\"]}]\n"])</script><script>self.__next_f.push([1,"29:I[988654,[\"/_next/static/chunks/3355f25cb11074b7.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"ScrollToHash\"]\n2a:I[605649,[\"/_next/static/chunks/3355f25cb11074b7.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"HeadingNav\"]\n28:T1e4d,"])</script><script>self.__next_f.push([1,"\nYour users have personal Gmail accounts open on their work machines. They're checking personal email alongside Google Workspace. They're sharing work documents from personal Drive. IT has no visibility, no DLP, no audit trail.\n\nThis is the shadow IT problem. You can't just block personal Gmail at the network level without breaking something. But you can make it unusable for work purposes — and that's what this post covers.\n\n## The Problem: Shadow IT in Google Workspace\n\nEvery organization has it: users who default to personal accounts for convenience. Personal Gmail on work devices. Personal Drive for sharing. Personal Calendar for everything.\n\nThe risks:\n- **No DLP** — Company data leaves to personal accounts with no controls\n- **No audit trail** — You can't investigate a data leak if you don't know it happened\n- **No lifecycle** — When they leave, access to work data persists in their personal account\n- **Compliance risk** — Often noncompliant with internal policy and regulated data-handling requirements\n\nThe goal: make personal Gmail unusable for work purposes without breaking legitimate personal use on personal devices.\n\n## How CASB Fits In\n\nCASB (Cloud Access Security Broker) sits between your users and cloud services, providing:\n- **Visibility** — What cloud apps are being used?\n- **Data protection** — DLP policies applied to cloud traffic\n- **Threat protection** — Anomaly detection for cloud usage\n- **Access control** — Block or restrict based on context\n\nGoogle Workspace integrates with CASB via API, not inline proxy. Google explicitly recommends API/offline CASB patterns over inline proxies — inline CASBs exist but aren't the preferred path. For most orgs, Google-native controls (DLP, Reports API, App Access Management) cover much of what you need before considering third-party CASB.\n\n### Shadow IT Discovery\n\nBefore you can block, you need to know what you're dealing with. The CASB (or Google Workspace audit logs) reveals:\n\n- **OAuth token inventory** — Which third-party apps have user-authorized access to their Google data\n- **Login activity** — Where are users authenticating from?\n- **Drive sharing** — What's being shared externally?\n- **App usage** — Which apps are accessing Google Workspace data?\n\nIn Google Workspace Admin console, go to Security \u003e API controls \u003e Access management. Review OAuth app entries — check ownership (Google-owned/internal/third-party), requested scopes, and user count. The CASB dashboard often surfaces this more visually.\n\nApps are categorized as **Trusted** (full access), **Limited** (specific Google data only), **Blocked** (no access), or the default for unconfigured apps. Mark unknown third-party apps as Blocked after reviewing scope and ownership.\n\n## The Migration Strategy\n\n### Phase 1: Discover and Categorize\n\nList every external app accessing your users' Google data. Categorize:\n- **Approved** — IT-sanctioned, security reviewed\n- **Tolerated** — Not ideal but not blocked yet\n- **Blocked** — Shadow IT, must go\n\nThe CASB dashboard usually provides this. If not, export audit logs and pivot in Excel.\n\n### Phase 2: Offer a Better Alternative\n\nUsers go to personal Gmail because the sanctioned option isn't convenient. Fix that:\n\n- **Google Workspace** — If you don't have it, get it. Every user gets company @company.com account.\n- **Shared drives** — Centralize file storage so personal Drive isn't needed\n- **SSO** — Single sign-on from Entra ID to Google Workspace removes the password burden\n\n### Phase 3: Enforce with Policy\n\nNow block. The enforcement stack, in order of impact:\n\n**1. Block personal Google accounts** — This is what actually makes personal Gmail unusable on managed devices. Configure via proxy: `X-GoogApps-Allowed-Domains: yourdomain.com`, or in Google Admin console \u003e Security \u003e Managed browser \u003e Restrict sign-in to managed accounts. This stops users from adding their personal @gmail.com account to Chrome or signing into personal Gmail on managed machines.\n\n**2. App Access Control** — In Security \u003e API controls \u003e Access management, configure apps as Trusted / Limited / Specific Google data / Blocked. This controls OAuth grants, not browser access. Set default to Blocked for unconfigured apps if you want zero tolerance.\n\n**3. Context-Aware Access** — Verify managed device before granting access to Workspace apps. Requires Endpoint Verification on desktop; mobile uses Google endpoint management (Intune, Jamf, etc.) for device signals.\n\n### Phase 4: Data Migration\n\nFor users with existing personal Gmail data that needs to come over:\n\n1. **Data import** — Admin imports personal Gmail to corporate account via Security \u003e Data export and management \u003e Data migration. Requires user authorization — they authorize their personal Gmail access. This isn't the \"Google Workspace Migrate\" tool (that's for Exchange migrations).\n2. **Takeout** — User exports personal Drive, admin migrates to Shared Drive\n3. **Calendar migration** — User exports from personal calendar, imports to corporate or shares calendar with corporate account\n\nThis takes time. Give users 30 days to migrate, then enforce.\n\n## The Enforcement Checklist\n\n| Control | Implementation | Effect |\n|---|---|---|\n| Consumer account block | X-GoogApps-Allowed-Domains header or managed browser sign-in restriction | Personal Gmail can't sign in on managed devices |\n| App Access Control | Set apps to Trusted / Limited / Blocked; default to Blocked for unconfigured | No unapproved OAuth apps |\n| Context-Aware Access | Require managed device (desktop: Endpoint Verification; mobile: endpoint management) | Unmanaged devices blocked |\n| Drive external sharing | Allowlist or trust rules for external sharing | No uncontrolled file sharing |\n| SSO | Entra ID to Google Workspace | One identity, one credential |\n\n**CAA rollout tip:** Start in **monitor mode** first. Block only after verifying compliant devices sync Endpoint Verification — Google docs warn that sync delays can incorrectly block compliant desktops.\n\n## What Actually Breaks First\n\nIn practice, this enforcement breaks these workflows:\n\n1. **User's personal phone** — They can't check corporate email on their personal Android/iOS without management installed. Solution: offer MDM enrollment or accept the limitation.\n\n2. **Third-party tools** — Users who authorized random SaaS apps lose access. Solution: pre-approve the most common ones (Zoom, Slack, etc.).\n\n3. **Contractors** — External users without managed devices. Solution: dedicated contractor accounts with limited access, or accept unmanaged access with increased monitoring.\n\n4. **Endpoint Verification sync delays** — Compliant desktops get blocked before they sync device status. Google's docs explicitly warn about this. Run in monitor mode first.\n\n5. **OAuth restrictions break integrations fast** — Zoom, Slack, calendaring add-ons, scanners, backup tools — all need explicit app access configuration or users lose functionality.\n\n6. **Delegated mailbox access** — Consumer account blocking with `X-GoogApps-Allowed-Domains` can break delegated mailbox access if the delegate's domain isn't in allowed headers.\n\n## The Takeaway\n\nYou can't uninvent personal Gmail. Your users will always have personal accounts. What you can do is make it operationally useless for work:\n\n- DLP policies block data exfiltration\n- Context-Aware Access restricts access to managed devices\n- SSO removes the password management burden\n- Structured migration moves existing data to corporate\n\nThe goal isn't to punish users who use personal accounts. It's to make the corporate alternative so seamless that personal use becomes friction for work purposes, not the other way around."])</script><script>self.__next_f.push([1,"25:[\"$\",\"$L23\",\"gcp-casb-shadow-it-migration\",{\"post\":{\"metadata\":{\"title\":\"Forcing the Shadow IT Migration: Making Personal Gmail Unusable in a Managed Network\",\"subtitle\":\"\",\"publishedAt\":\"2026-04-28\",\"summary\":\"Personal Gmail inside your corporate network isn't just a compliance risk — it's a data leak waiting to happen. Here's how to use CASB policies, Context-Aware Access, and structured migration to make shadow IT unusable.\",\"image\":\"/images/blog/gcp-casb-shadow-it-migration.png\",\"images\":[],\"tag\":\"Security\",\"team\":[],\"link\":\"\"},\"slug\":\"gcp-casb-shadow-it-migration\",\"content\":\"$28\"},\"thumbnail\":true,\"direction\":\"column\"}]\n26:[\"$\",\"$L29\",null,{}]\n27:[\"$\",\"$L10\",null,{\"maxWidth\":12,\"paddingLeft\":\"40\",\"fitHeight\":true,\"position\":\"sticky\",\"top\":\"80\",\"gap\":\"16\",\"m\":{\"hide\":true},\"children\":[\"$\",\"$L2a\",null,{\"fitHeight\":true}]}]\n"])</script><script>self.__next_f.push([1,"2b:I[811052,[\"/_next/static/chunks/3355f25cb11074b7.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"HeadingLink\"]\n2c:I[362844,[\"/_next/static/chunks/3355f25cb11074b7.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"InlineCode\"]\n2d:I[597784,[\"/_next/static/chunks/3355f25cb11074b7.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"CodeBlock\"]\n"])</script><script>self.__next_f.push([1,"1e:[[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The first version of my Claude Code config replaced the default (no memory) with a structured 4-file system: goals, decisions, progress, gotchas. Markdown files, hooks that read and write them, a summary injected at session start. It worked. For a few months.\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The problem with flat markdown files isn't that they fail — it's that they don't scale. After a few hundred entries across a dozen projects, you start noticing the cracks. Duplicate decisions. Gotchas that contradict each other because the older one was never updated. Progress logs that grow faster than they get trimmed. No way to ask \\\"what do I know about Supabase\\\" without reading every file.\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The v2 config replaces all of it with SQLite.\"}],\"\\n\",[\"$\",\"$L2b\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"the-shift-to-sqlite-ltm\",\"children\":\"The shift to SQLite LTM\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[\"The new system lives at \",[\"$\",\"$L2c\",null,{\"children\":\"~/.claude/memory/ltm.db\"}],\". Every memory, decision, gotcha, and progress item is a row. Projects are foreign-keyed. Relationships between memories are edges in a separate table.\"]}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The hook system still works the same way from the outside — SessionStart injects context, PreCompact writes a snapshot, UpdateContext logs progress. What changed is what's underneath. Instead of appending to markdown files and hoping the trimming logic holds, everything goes to SQLite with indexed columns, typed categories, and a schema that can actually evolve.\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The immediate win is queries. You can now run:\"}],\"\\n\",[\"$\",\"$L2d\",null,{\"marginTop\":\"8\",\"marginBottom\":\"16\",\"codes\":[{\"code\":\"bun -e \\\"\\n  const { getItems } = await import(process.env.HOME + '/.claude/memory/context.js');\\n  const gotchas = getItems('project-name', 'gotcha');\\n  console.log(JSON.stringify(gotchas));\\n\\\"\\n\",\"language\":\"bash\",\"label\":\"Bash\"}],\"copyButton\":true}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"And get back a filtered, structured list — not a blob of markdown you have to parse mentally.\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[\"New commands that came with it: \",[\"$\",\"$L2c\",null,{\"children\":\"/learn\"}],\", \",[\"$\",\"$L2c\",null,{\"children\":\"/recall\"}],\", \",[\"$\",\"$L2c\",null,{\"children\":\"/forget\"}],\", \",[\"$\",\"$L2c\",null,{\"children\":\"/relate\"}],\", \",[\"$\",\"$L2c\",null,{\"children\":\"/check-context\"}],\", \",[\"$\",\"$L2c\",null,{\"children\":\"/init-context\"}],\". The ones I use constantly are \",[\"$\",\"$L2c\",null,{\"children\":\"/recall\"}],\" (before starting any non-trivial task — surface past decisions before making new ones) and \",[\"$\",\"$L2c\",null,{\"children\":\"/learn\"}],\" (mid-session when something important comes up that shouldn't be lost to compaction).\"]}],\"\\n\",\"$L2e\",\"\\n\",\"$L2f\",\"\\n\",\"$L30\",\"\\n\",\"$L31\",\"\\n\",\"$L32\",\"\\n\",\"$L33\",\"\\n\",\"$L34\",\"\\n\",\"$L35\",\"\\n\",\"$L36\",\"\\n\",\"$L37\",\"\\n\",\"$L38\",\"\\n\",\"$L39\",\"\\n\",\"$L3a\",\"\\n\",\"$L3b\",\"\\n\",\"$L3c\",\"\\n\",\"$L3d\",\"\\n\",\"$L3e\",\"\\n\",\"$L3f\",\"\\n\",\"$L40\",\"\\n\",\"$L41\",\"\\n\",\"$L42\",\"\\n\",\"$L43\",\"\\n\",\"$L44\",\"\\n\",\"$L45\",\"\\n\",\"$L46\"]\n"])</script><script>self.__next_f.push([1,"47:I[436122,[\"/_next/static/chunks/3355f25cb11074b7.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"List\"]\n48:I[626935,[\"/_next/static/chunks/3355f25cb11074b7.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"ListItem\"]\n2e:[\"$\",\"$L2b\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"the-janitor-agent\",\"children\":\"The Janitor agent\"}]\n2f:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The memory problem I didn't anticipate: memories go stale. A decision made in February about one project's architecture has nothing to do with March, but it stays in the DB forever unless someone removes it. Duplicates accumulate. A gotcha from an early attempt at something gets superseded by a better approach but both entries survive.\"}]\n30:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[\"The Janitor is an autonomous sub-agent that runs inside \",[\"$\",\"$L2c\",null,{\"children\":\"memory/server.ts\"}],\". It has four stages:\"]}]\n31:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Decay\"}],\" — memories that haven't been used get a confidence score that degrades over time. Below a configurable threshold (default 0.2), they get archived. Not deleted — archived. You can review them.\"]}]\n32:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Auto-promote\"}],\" — when the UpdateContext hook writes a \",[\"$\",\"$L2c\",null,{\"children\":\"decision\"}],\" or \",[\"$\",\"$L2c\",null,{\"children\":\"gotcha\"}],\" context item, the Janitor elevates it to a global memory automatically. No manual \",[\"$\",\"$L2c\",null,{\"children\":\"/learn\"}],\" required for things that come out of normal workflow.\"]}]\n33:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Semantic dedup\"}],\" — each memory gets an embedding vector. The Janitor runs cosine similarity across them. Anything above 0.85 similarity is flagged as a potential duplicate, and an LLM proposes a merge. The merge goes to a pending queue — you approve or reject, nothing changes automatically.\"]}]\n34:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Supersedes\"}],\" — when memories are merged, the old ones get marked \",[\"$\",\"$L2c\",null,{\"children\":\"superseded\"}],\" with a \",[\"$\",\"$L2c\",null,{\"children\":\"supersedes\"}],\" edge in the relations table. The knowledge graph stays consistent.\"]}]\n35:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The part I like most: nothing the Janitor proposes takes effect without confirmation. It generates a queue of pending actions and surfaces them in a UI. You review, approve what makes sense, reject what doesn't. The agent maintains the memory system; you stay in control of what it actually does.\"}]\n36:[\"$\",\"$L2b\",null,{\"marginTop\":\"2"])</script><script>self.__next_f.push([1,"4\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"the-graph-visualizer\",\"children\":\"The graph visualizer\"}]\n37:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The SQLite backend enabled something that wasn't possible with markdown files: a knowledge graph.\"}]\n38:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"$L2c\",null,{\"children\":\"memory/server.ts\"}],\" runs a Bun server on port 7331. \",[\"$\",\"$L2c\",null,{\"children\":\"memory/graph-app/\"}],\" is a Next.js app on 7332 that reads from it via WebSocket. What you see is a D3 force graph: project nodes, memory nodes, context item nodes, edges representing relationships.\"]}]\n39:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[\"The layout is intentionally organic — link strength varies by relationship type. \",[\"$\",\"$L2c\",null,{\"children\":\"context_of\"}],\" links are loose (0.04), so context items float near their projects. \",[\"$\",\"$L2c\",null,{\"children\":\"project_scope\"}],\" links are tighter (0.25). Memory-to-memory relations are strong (0.6). The simulation converges and you can see clusters.\"]}]\n3a:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Practically useful features:\"}]\n3b:[\"$\",\"$L47\",null,{\"as\":\"ul\",\"children\":[\"\\n\",[\"$\",\"$L48\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"⌘K spotlight search\"}],\" — FTS5-powered, keyboard navigable, zooms the graph to the matching node on select\"]}],\"\\n\",[\"$\",\"$L48\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Tag filter panel\"}],\" — click a tag to dim everything that doesn't match\"]}],\"\\n\",[\"$\",\"$L48\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Project drill-down\"}],\" — click any project node to get a dedicated page with all its context, memories, and relations\"]}],\"\\n\",[\"$\",\"$L48\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Pending actions page\"}],\" — the Janitor's propose queue, one click to approve or reject\"]}],\"\\n\"]}]\n3c:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The graph makes something visible that was always there but invisible: what the model actually knows about your projects, how those memories relate, and where the gaps or stale entries are.\"}]\n3d:[\"$\",\"$L2b\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"multi-provider-embeddings\",\"children\":\"Multi-provider embeddings\"}]\n3e:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[\"Semantic dedup and the \",[\"$\",\"$L2c\",null,{\"children\":\"/recall\"}],\" search need embeddings. The system now supports six providers: Gemini, OpenAI, Anthropic, Cohere, OpenRouter, Ollama.\"]}]\n3f:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[\"The settings UI at \",[\"$\",\"$L2c\",null,{\"children\":\"/settings\"}],\" lets you pick your embed provider, verify the API key inline (paste → spinner → green/red), and select from a dropdown of available models for that provider. It doesn't matter which you use for the embeddings"])</script><script>self.__next_f.push([1," — what matters is consistency, since vectors from different models aren't comparable.\"]}]\n40:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"I run Ollama locally for embeddings. No API key, no cost, fast enough for the volume of memories a single developer accumulates.\"}]\n41:[\"$\",\"$L2b\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"what-actually-changed-day-to-day\",\"children\":\"What actually changed day-to-day\"}]\n42:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The hooks look the same from the outside. Session starts, context is injected, work happens, progress is logged. The difference is what happens underneath and over time.\"}]\n43:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"With markdown files, the system degraded slowly. Files got messy. Duplicates crept in. The 20-item trim on progress.md was a blunt instrument. You never really knew what was in the DB unless you opened the files.\"}]\n44:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"With SQLite, the system improves over time. Memories that matter get used, have their confidence reinforced, and survive. Memories that stop being relevant decay. The Janitor surfaces what needs attention instead of letting stale data accumulate silently.\"}]\n45:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The graph visualizer isn't something I use every session — but when I do open it, it answers questions that were previously unanswerable: \\\"what have I decided about this project?\\\", \\\"is there a gotcha about this library I logged a month ago?\\\", \\\"why does this memory exist?\\\"\"}]\n46:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[\"The config is version-controlled at \",[\"$\",\"a\",null,{\"href\":\"https://github.com/RohiRIK/claude-code-config\",\"target\":\"_blank\",\"rel\":\"noopener noreferrer\",\"children\":\"github.com/RohiRIK/claude-code-config\"}],\".\"]}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\
