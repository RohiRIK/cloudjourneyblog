se 1: Emergency Access \u0026 Monitoring Foundation\n\nBefore touching anything else, you need:\n\n- **Breakglass accounts** — Named emergency accounts that bypass all Conditional Access. Don't use these daily. Test them quarterly.\n- **Alerting baseline** — What does normal look like? Capture login patterns, device health, app usage before you start blocking.\n\nThis is the unsexy phase that saves you when Phase 3 locks everyone out.\n\n### Phase 2: Security Info Registration\n\nBefore enforcing MFA, users need to register authentication methods. Set this up first:\n- **Auth methods policy** — Enable Microsoft Authenticator, FIDO2, Windows Hello for Business\n- **Temporary Access Pass** — One-time codes for users who lose hardware keys\n- **Report-only mode** — Test CA policies before enforcing\n\n### Phase 3: Block Legacy Authentication\n\nLegacy auth (SMTP auth, basic auth, POP/IMAP) is the attack surface. Block it:\n\n```\nConditional Access \u003e Assignments \u003e Cloud apps \u003e All apps\nConditions \u003e Client apps \u003e Select Exchange ActiveSync clients and Other clients\nControls \u003e Grant \u003e Block access\n```\n\nBlock legacy auth too early and you'll break:\n- Legacy application integrations\n- Service accounts with password auth only\n- Old MFA integrations that sit behind legacy protocols\n\n**What broke first:** SMTP-authenticated printer scanning and IoT device integrations. Both used basic auth with no modern auth path.\n\n### Phase 3: MFA Enforcement\n\nPhishing-resistant MFA is the goal. FIDO2 hardware keys. But hardware keys have procurement and onboarding friction:\n\n- Procurement: Buy 50 keys, distribute to Tier-1 roles (privileged users, admins)\n- Onboarding: Users need to register in-browser with Chrome/Edge (Firefox support is spotty)\n- Policy: Require phishing-resistant MFA for admin roles; offer standard MFA as fallback for general users\n\n**What broke first:** Users who lost their hardware keys. Registration flow required a new key + backup key, and the process times out fast.\n\n### Phase 4: Device Compliance (Intune Baselines)\n\nIntune security baselines + Conditional Access is where device trust lives:\n\n- **Windows baseline** — BitLocker, Windows Defender, firewall rules\n- **Device compliance policy** — Require Microsoft Entra hybrid joined OR compliant device\n- **MDE integration** — Device risk from Defender feeds CA decisions\n\n**What broke first:** Microsoft Entra hybrid join fails when:\n- Stale device objects in on-prem AD aren't cleaned up\n- Line-of-business apps still query on-prem AD only (no cloud auth path)\n- Users are co-managed (Intune + SCCM) and the policy boundary isn't clear\n\n### Phase 5: Session Controls\n\nSign-in frequency and device restrictions for existing sessions:\n- **Sign-in frequency** — Re-authenticate after X hours or when device state changes\n- **Persistent browser** — Block to prevent session cookie replay\n- **App-enforced restrictions** — Disable clipboard/file copy for unmanaged devices\n\n### Phase 6: Risk-Based Conditional Access\n\nIdentity Protection risk signals drive dynamic policies:\n\n- **High-risk sign-in** — Block or require MFA\n- **Risky user** — Force password reset\n- **Microsoft Defender for Identity** — Detect lateral movement, privilege escalation, and domain escalation attacks\n\n**What broke first:** False positives. Risky sign-in policies flagged VPN users on corporate devices because the sign-in location didn't match.\n\n### Phase 7: Network Segmentation (802.1X)\n\nWiFi authentication via 802.1X (WPA2-Enterprise) is network-level Zero Trust:\n\n- **EAP method** — EAP-TLS with certificate-based auth (vs. EAP-PEAP/MSCHAPv2)\n- **Certificate lifecycle** — SCEP or PKCS certificate profile from Intune\n- **Fallback** — WPA2-PSK for legacy devices that can't do 802.1X\n\n**What broke first:** EAP negotiation failures. Root causes:\n- Wrong EAP type configured on client vs. RADIUS\n- Server certificate missing trusted root on client\n- Server name validation mismatch (certificate SAN doesn't match RADIUS hostname)\n- Expired or revoked client/server certificates\n\n## What Actually Broke First\n\nAfter three years, here's the friction ranking:\n\n| Friction Point | Phase | Symptom |\n|---|---|---|\n| 802.1X EAP failures | Network | Users can't connect to WiFi; RADIUS shows method mismatch |\n| Device baseline conflicts | Device | Co-managed devices have conflicting policies from SCCM and Intune |\n| Legacy app breakage | Identity | LOB apps fail when legacy auth is blocked |\n| False-positive risky sign-ins | Identity | VPN users flagged as risky based on location |\n| Hardware key loss | MFA | Users lose keys, no backup, lockout |\n| Breakglass account lockout | Foundation | Breakglass account passwords expire or are not tested |\n\n## The Hard Lessons\n\n1. **Don't start with blocking.** Start with alerting and monitoring. Baseline normal before you break normal.\n\n2. **Phased enforcement, not big bang.** Each phase enables the next. Block legacy auth → enforce MFA → require device compliance → apply risk-based access.\n\n3. **802.1X is the hardest network control.** Budget double the time for 802.1X pilot. EAP-TLS certificate validation is where it fails.\n\n4. **Device trust requires clear ownership.** If you're co-managed (SCCM + Intune), define the boundary. We used Intune for cloud-native devices, SCCM for remaining on-prem managed.\n\n5. **Governance is the bottleneck.** Zero Trust fails when cross-team ownership isn't clear. Identity owns CA policies. Endpoint owns device baselines. Network owns 802.1X. Security owns MDI.\n\n## The Takeaway\n\nZero Trust isn't a project with an end date. It's an operational posture. The sequence matters: emergency access → security info registration → legacy block → MFA → device compliance → session controls → risk-based access → 802.1X.\n\nThe only thing that broke irreparably was when we tried to skip Phase 1."])</script><script>self._ lly Broke\",\"subtitle\":\"\",\"publishedAt\":\"2026-04-29\",\"summary\":\"A multi-year Zero Trust program across MDE, Intune baselines, Conditional Access, phishing-resistant MFA, 802.1X, and MDI. Here's what we implemented, in what order, and what broke first.\",\"image\":\"/images/blog/zero-trust-retrospective.png\",\"images\":[],\"tag\":\"Security\",\"team\":[],\"link\":\"\"},\"slug\":\"zero-trust-retrospective\",\"content\":\"$24\"},\"thumbnail\":true,\"direction\":\"column\"}],\"$L25\"]}]]}],\"$L26\"]}]}],\"$L27\"]}]\n"])</script><script>self.__next_f.push([1,"29:I[988654,[\"/_next/static/chunks/3355f25cb11074b7.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"ScrollToHash\"]\n2a:I[605649,[\"/_next/static/chunks/3355f25cb11074b7.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"HeadingNav\"]\n28:T1e4d,"])</script><script>self.__next_f.push([1,"\nYour users have personal Gmail accounts open on their work machines. They're checking personal email alongside Google Workspace. They're sharing work documents from personal Drive. IT has no visibility, no DLP, no audit trail.\n\nThis is the shadow IT problem. You can't just block personal Gmail at the network level without breaking something. But you can make it unusable for work purposes — and that's what this post covers.\n\n## The Problem: Shadow IT in Google Workspace\n\nEvery organization has it: users who default to personal accounts for convenience. Personal Gmail on work devices. Personal Drive for sharing. Personal Calendar for everything.\n\nThe risks:\n- **No DLP** — Company data leaves to personal accounts with no controls\n- **No audit trail** — You can't investigate a data leak if you don't know it happened\n- **No lifecycle** — When they leave, access to work data persists in their personal account\n- **Compliance risk** — Often noncompliant with internal policy and regulated data-handling requirements\n\nThe goal: make personal Gmail unusable for work purposes without breaking legitimate personal use on personal devices.\n\n## How CASB Fits In\n\nCASB (Cloud Access Security Broker) sits between your users and cloud services, providing:\n- **Visibility** — What cloud apps are being used?\n- **Data protection** — DLP policies applied to cloud traffic\n- **Threat protection** — Anomaly detection for cloud usage\n- **Access control** — Block or restrict based on context\n\nGoogle Workspace integrates with CASB via API, not inline proxy. Google explicitly recommends API/offline CASB patterns over inline proxies — inline CASBs exist but aren't the preferred path. For most orgs, Google-native controls (DLP, Reports API, App Access Management) cover much of what you need before considering third-party CASB.\n\n### Shadow IT Discovery\n\nBefore you can block, you need to know what you're dealing with. The CASB (or Google Workspace audit logs) reveals:\n\n- **OAuth token inventory** — Which third-party apps have user-authorized access to their Google data\n- **Login activity** — Where are users authenticating from?\n- **Drive sharing** — What's being shared externally?\n- **App usage** — Which apps are accessing Google Workspace data?\n\nIn Google Workspace Admin console, go to Security \u003e API controls \u003e Access management. Review OAuth app entries — check ownership (Google-owned/internal/third-party), requested scopes, and user count. The CASB dashboard often surfaces this more visually.\n\nApps are categorized as **Trusted** (full access), **Limited** (specific Google data only), **Blocked** (no access), or the default for unconfigured apps. Mark unknown third-party apps as Blocked after reviewing scope and ownership.\n\n## The Migration Strategy\n\n### Phase 1: Discover and Categorize\n\nList every external app accessing your users' Google data. Categorize:\n- **Approved** — IT-sanctioned, security reviewed\n- **Tolerated** — Not ideal but not blocked yet\n- **Blocked** — Shadow IT, must go\n\nThe CASB dashboard usually provides this. If not, export audit logs and pivot in Excel.\n\n### Phase 2: Offer a Better Alternative\n\nUsers go to personal Gmail because the sanctioned option isn't convenient. Fix that:\n\n- **Google Workspace** — If you don't have it, get it. Every user gets company @company.com account.\n- **Shared drives** — Centralize file storage so personal Drive isn't needed\n- **SSO** — Single sign-on from Entra ID to Google Workspace removes the password burden\n\n### Phase 3: Enforce with Policy\n\nNow block. The enforcement stack, in order of impact:\n\n**1. Block personal Google accounts** — This is what actually makes personal Gmail unusable on managed devices. Configure via proxy: `X-GoogApps-Allowed-Domains: yourdomain.com`, or in Google Admin console \u003e Security \u003e Managed browser \u003e Restrict sign-in to managed accounts. This stops users from adding their personal @gmail.com account to Chrome or signing into personal Gmail on managed machines.\n\n**2. App Access Control** — In Security \u003e API controls \u003e Access management, configure apps as Trusted / Limited / Specific Google data / Blocked. This controls OAuth grants, not browser access. Set default to Blocked for unconfigured apps if you want zero tolerance.\n\n**3. Context-Aware Access** — Verify managed device before granting access to Workspace apps. Requires Endpoint Verification on desktop; mobile uses Google endpoint management (Intune, Jamf, etc.) for device signals.\n\n### Phase 4: Data Migration\n\nFor users with existing personal Gmail data that needs to come over:\n\n1. **Data import** — Admin imports personal Gmail to corporate account via Security \u003e Data export and management \u003e Data migration. Requires user authorization — they authorize their personal Gmail access. This isn't the \"Google Workspace Migrate\" tool (that's for Exchange migrations).\n2. **Takeout** — User exports personal Drive, admin migrates to Shared Drive\n3. **Calendar migration** — User exports from personal calendar, imports to corporate or shares calendar with corporate account\n\nThis takes time. Give users 30 days to migrate, then enforce.\n\n## The Enforcement Checklist\n\n| Control | Implementation | Effect |\n|---|---|---|\n| Consumer account block | X-GoogApps-Allowed-Domains header or managed browser sign-in restriction | Personal Gmail can't sign in on managed devices |\n| App Access Control | Set apps to Trusted / Limited / Blocked; default to Blocked for unconfigured | No unapproved OAuth apps |\n| Context-Aware Access | Require managed device (desktop: Endpoint Verification; mobile: endpoint management) | Unmanaged devices blocked |\n| Drive external sharing | Allowlist or trust rules for external sharing | No uncontrolled file sharing |\n| SSO | Entra ID to Google Workspace | One identity, one credential |\n\n**CAA rollout tip:** Start in **monitor mode** first. Block only after verifying compliant devices sync Endpoint Verification — Google docs warn that sync delays can incorrectly block compliant desktops.\n\n## What Actually Breaks First\n\nIn practice, this enforcement breaks these workflows:\n\n1. **User's personal phone** — They can't check corporate email on their personal Android/iOS without management installed. Solution: offer MDM enrollment or accept the limitation.\n\n2. **Third-party tools** — Users who authorized random SaaS apps lose access. Solution: pre-approve the most common ones (Zoom, Slack, etc.).\n\n3. **Contractors** — External users without managed devices. Solution: dedicated contractor accounts with limited access, or accept unmanaged access with increased monitoring.\n\n4. **Endpoint Verification sync delays** — Compliant desktops get blocked before they sync device status. Google's docs explicitly warn about this. Run in monitor mode first.\n\n5. **OAuth restrictions break integrations fast** — Zoom, Slack, calendaring add-ons, scanners, backup tools — all need explicit app access configuration or users lose functionality.\n\n6. **Delegated mailbox access** — Consumer account blocking with `X-GoogApps-Allowed-Domains` can break delegated mailbox access if the delegate's domain isn't in allowed headers.\n\n## The Takeaway\n\nYou can't uninvent personal Gmail. Your users will always have personal accounts. What you can do is make it operationally useless for work:\n\n- DLP policies block data exfiltration\n- Context-Aware Access restricts access to managed devices\n- SSO removes the password management burden\n- Structured migration moves existing data to corporate\n\nThe goal isn't to punish users who use personal accounts. It's to make the corporate alternative so seamless that personal use becomes friction for work purposes, not the other way around."])</script><script>self.__next_f.push([1,"25:[\"$\",\"$L23\",\"gcp-casb-shadow-it-migration\",{\"post\":{\"metadata\":{\"title\":\"Forcing the Shadow IT Migration: Making Personal Gmail Unusable in a Managed Network\",\"subtitle\":\"\",\"publishedAt\":\"2026-04-28\",\"summary\":\"Personal Gmail inside your corporate network isn't just a compliance risk — it's a data leak waiting to happen. Here's how to use CASB policies, Context-Aware Access, and structured migration to make shadow IT unusable.\",\"image\":\"/images/blog/gcp-casb-shadow-it-migration.png\",\"images\":[],\"tag\":\"Security\",\"team\":[],\"link\":\"\"},\"slug\":\"gcp-casb-shadow-it-migration\",\"content\":\"$28\"},\"thumbnail\":true,\"direction\":\"column\"}]\n26:[\"$\",\"$L29\",null,{}]\n27:[\"$\",\"$L10\",null,{\"maxWidth\":12,\"paddingLeft\":\"40\",\"fitHeight\":true,\"position\":\"sticky\",\"top\":\"80\",\"gap\":\"16\",\"m\":{\"hide\":true},\"children\":[\"$\",\"$L2a\",null,{\"fitHeight\":true}]}]\n"])</script><script>self.__next_f.push([1,"2b:I[811052,[\"/_next/static/chunks/3355f25cb11074b7.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"HeadingLink\"]\n"])</script><script>self.__next_f.push([1,"1e:[[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Zero Trust is one of those frameworks that everyone talks about and few people have actually implemented end-to-end. It's easy to describe the principle — never trust, always verify — and hard to execute it across an estate that spans legacy OT systems, hybrid Active Directory, cloud workloads, and thousands of endpoints.\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"This is a retrospective on a 57-task Zero Trust program I ran for an energy sector client over 18 months. I'll cover what we did, what we got wrong, and what I'd do differently next time.\"}],\"\\n\",[\"$\",\"$L2b\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"the-starting-point\",\"children\":\"The Starting Point\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The organization had a traditional perimeter security model: a corporate firewall, AD-joined workstations, and a VPN for remote access. It worked — until it didn't.\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The triggering events were a phishing campaign that got as far as a finance workstation, a VPN breach via a contractor whose credentials had been reused on an breached external service, and a regulatory audit that flagged the lack of endpoint visibility as a finding.\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The board approved a Zero Trust program. 18 months. 57 tasks. Full scope.\"}],\"\\n\",[\"$\",\"$L2b\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"what-we-built\",\"children\":\"What We Built\"}],\"\\n\",[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The program broke down into six workstreams:\"}],\"\\n\",[\"$\",\"table\",null,{\"marginTop\":\"12\",\"marginBottom\":\"12\",\"style\":{\"width\":\"100%\",\"borderCollapse\":\"collapse\",\"fontSize\":\"0.875rem\",\"lineHeight\":\"1.75\"},\"children\":[[\"$\",\"thead\",null,{\"style\":{\"borderBottom\":\"1px solid var(--neutral-alpha-medium)\",\"backgroundColor\":\"var(--neutral-alpha-soft)\"},\"children\":[\"$\",\"tr\",null,{\"style\":{\"borderBottom\":\"1px solid var(--neutral-alpha-small)\"},\"children\":[[\"$\",\"th\",null,{\"style\":{\"padding\":\"8px 12px\",\"textAlign\":\"left\",\"fontWeight\":\"600\"},\"children\":\"Workstream\"}],[\"$\",\"th\",null,{\"style\":{\"padding\":\"8px 12px\",\"textAlign\":\"left\",\"fontWeight\":\"600\"},\"children\":\"Scope\"}],[\"$\",\"th\",null,{\"style\":{\"padding\":\"8px 12px\",\"textAlign\":\"left\",\"fontWeight\":\"600\"},\"children\":\"Duration\"}]]}]}],[\"$\",\"tbody\",null,{\"children\":[[\"$\",\"tr\",null,{\"style\":{\"borderBottom\":\"1px solid var(--neutral-alpha-small)\"},\"children\":[[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"Identity \u0026 Access\"}],[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"Entra ID, Conditional Access, phishing-resistant MFA\"}],[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"Months 1-6\"}]]}],[\"$\",\"tr\",null,{\"style\":{\"borderBottom\":\"1px solid var(--neutral-alpha-small)\"},\"children\":[[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"Endpoint Management\"}],[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"MDE deployment, Intune, security baselines\"}],[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"Months 3-9\"}]]}],[\"$\",\"tr\",null,{\"style\":{\"borderBottom\":\"1px solid var(--neutral-alpha-small)\"},\"children\":[[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"Network Segmentation\"}],[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"Microsegmentation, 802.1X wired/wireless, VLAN restructuring\"}],\"$L2c\"]}],\"$L2d\",\"$L2e\",\"$L2f\"]}]]}],\"\\n\",\"$L30\",\"\\n\",\"$L31\",\"\\n\",\"$L32\",\"\\n\",\"$L33\",\"\\n\",\"$L34\",\"\\n\",\"$L35\",\"\\n\",\"$L36\",\"\\n\",\"$L37\",\"\\n\",\"$L38\",\"\\n\",\"$L39\",\"\\n\",\"$L3a\",\"\\n\",\"$L3b\",\"\\n\",\"$L3c\",\"\\n\",\"$L3d\",\"\\n\",\"$L3e\",\"\\n\",\"$L3f\",\"\\n\",\"$L40\",\"\\n\",\"$L41\",\"\\n\",\"$L42\",\"\\n\",\"$L43\",\"\\n\",\"$L44\",\"\\n\",\"$L45\",\"\\n\",\"$L46\",\"\\n\",\"$L47\",\"\\n\",\"$L48\",\"\\n\",\"$L49\",\"\\n\",\"$L4a\",\"\\n\",\"$L4b\",\"\\n\",\"$L4c\",\"\\n\",\"$L4d\",\"\\n\",\"$L4e\",\"\\n\",\"$L4f\",\"\\n\",\"$L50\",\"\\n\",\"$L51\",\"\\n\",\"$L52\",\"\\n\",\"$L53\",\"\\n\",\"$L54\",\"\\n\",\"$L55\",\"\\n\",\"$L56\",\"\\n\",\"$L57\",\"\\n\",\"$L58\",\"\\n\",\"$L59\",\"\\n\",\"$L5a\"]\n"])</script><script>self.__next_f.push([1,"5b:I[436122,[\"/_next/static/chunks/3355f25cb11074b7.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"List\"]\n5c:I[626935,[\"/_next/static/chunks/3355f25cb11074b7.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"ListItem\"]\n5d:I[597784,[\"/_next/static/chunks/3355f25cb11074b7.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/909e86f090b49392.js\"],\"CodeBlock\"]\n2c:[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"Months 4-12\"}]\n2d:[\"$\",\"tr\",null,{\"style\":{\"borderBottom\":\"1px solid var(--neutral-alpha-small)\"},\"children\":[[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"Device Intelligence\"}],[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"MDI deployment, device compliance policies\"}],[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"Months 6-12\"}]]}]\n2e:[\"$\",\"tr\",null,{\"style\":{\"borderBottom\":\"1px solid var(--neutral-alpha-small)\"},\"children\":[[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"Cloud Security\"}],[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"Defender for Cloud Apps, CASB, workload identities\"}],[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"Months 8-15\"}]]}]\n2f:[\"$\",\"tr\",null,{\"style\":{\"borderBottom\":\"1px solid var(--neutral-alpha-small)\"},\"children\":[[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"Monitoring \u0026 Response\"}],[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"Sentinel, SOC integration, alert triage playbooks\"}],[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"Months 10-18\"}]]}]\n30:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The workstreams ran in parallel where dependencies allowed and sequentially where they didn't. Identity was always first — you can't do Zero Trust without identity as the control plane.\"}]\n31:[\"$\",\"$L2b\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"identity-the-foundation\",\"children\":\"Identity: The Foundation\"}]\n32:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"We started with Entra ID and Conditional Access. The goal was simple: every access request — regardless of where it originates — gets evaluated against identity, device compliance, and risk signals.\"}]\n33:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The first six months were brutal. The Conditional Access policy surface grew from nothing to 40+ policies covering:\"}]\n34:[\"$\",\"$L5b\",null,{\"as\":\"ul\",\"children\":[\"\\n\",[\"$\",\"$L5c\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"All cloud apps require compliant device\"}],\"\\n\",[\"$\",\"$L5c\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Legacy authentication blocked (Basic auth, SOAP, ADAL)\"}],\"\\n\",[\"$\",\"$L5c\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"High-privilege role holders require phishing-resistant MFA\"}],\"\\n\",[\"$\",\"$L5c\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Guest access limited to specific apps with data loss prevention applied\"}],\"\\n\",[\"$\",\"$L5c\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Sign-in risk-based policies that step up auth on anomalo"])</script><script>self.__next_f.push([1,"us behavior\"}],\"\\n\"]}]\n35:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The hardest part wasn't technical — it was organizational. Convincing business unit leads to accept that their device needed to be compliant before accessing SharePoint took longer than writing the policies.\"}]\n36:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"What broke:\"}],\" We wrote a policy that blocked legacy authentication globally, which took down a SCADA reporting tool that only supported Basic auth over HTTPS. We had to carve out an exception, add the application to a roadmap for upgrade, and monitor that carveout until it was retired. Exception management became a full-time task.\"]}]\n37:[\"$\",\"$L2b\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"endpoint-mde-intune\",\"children\":\"Endpoint: MDE + Intune\"}]\n38:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Months 3-9 covered endpoint deployment. We enrolled all endpoints into Intune, deployed MDE for endpoint detection and response, and applied security baselines.\"}]\n39:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The deployment order was deliberate:\"}]\n3a:[\"$\",\"$L5b\",null,{\"as\":\"ol\",\"children\":[\"\\n\",[\"$\",\"$L5c\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Pilot group\"}],\" — IT and security team first (50 machines)\"]}],\"\\n\",[\"$\",\"$L5c\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"VIP group\"}],\" — executives and finance (100 machines)\"]}],\"\\n\",[\"$\",\"$L5c\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Engineering\"}],\" — software teams with developer workstations (300 machines)\"]}],\"\\n\",[\"$\",\"$L5c\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"General workforce\"}],\" — the remaining 2,000 machines\"]}],\"\\n\"]}]\n3b:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Each ring had a two-week observation window before unlocking the next. This let us catch policy conflicts (we had three application compatibility issues that required baseline adjustments) before they hit the whole organization.\"}]\n3c:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"What broke:\"}],\" The Intune security baseline for Windows blocked a legacy ERP client that used an unsigned DLL loader. We had to relax the block, document the exception, and escalate to the application owner for a remediation timeline. Three other exceptions followed a similar pattern.\"]}]\n3d:[\"$\",\"$L2b\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"network-802.1x-and-microsegmentation\",\"children\":\"Network: 802.1X and Microsegmentation\"}]\n3e:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"This was the most disruptive workstream. 802.1X for wired and wireless access requires every device — including IoT and OT systems — to authenticate before getting network access.\"}]\n3f:[\"$\",\"span\",null,{\""])</script><script>self.__next_f.push([1,"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The challenge: the organization had 15 years of flat network architecture. Printers, badge readers, SCADA interfaces, and HVAC systems all sat on the same VLANs as user workstations.\"}]\n40:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"We couldn't onboard everything to 802.1X immediately. So we used a phased approach:\"}]\n41:[\"$\",\"$L5d\",null,{\"marginTop\":\"8\",\"marginBottom\":\"16\",\"codes\":[{\"code\":\"# Phase 1: Supplicant deployment (months 4-6)\\n# Push 802.1X supplicant config to all domain-joined devices via Intune\\n# Devices get provisioning packages, IT validates in pilot\\n\\n# Phase 2: Switch configuration (months 6-9)\\n# Reconfigure access switches for 802.1X with fallback to MAB\\n# MAC Authentication Bypass for devices that can't do 802.1X\\n\\n# Phase 3: VLAN isolation (months 9-12)\\n# Move non-compliant devices to quarantine VLAN\\n# Isolate OT/IoT on dedicated segments with gateway controls\\n\",\"language\":\"bash\",\"label\":\"Bash\"}],\"copyButton\":true}]\n42:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"What broke:\"}],\" A building management system that couldn't authenticate to 802.1X and had no fallback configured went dark during a switch firmware upgrade. The BMS vendor took two weeks to provide updated firmware. The building had no HVAC control for that period. It was not a quiet two weeks.\"]}]\n43:[\"$\",\"$L2b\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"device-intelligence-mdi\",\"children\":\"Device Intelligence: MDI\"}]\n44:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"MDI (Microsoft Defender for Identity) came in at month 6, after enough Entra ID and endpoint coverage was in place to give it meaningful data. The integration with Sentinel gave the SOC a unified view of identity-based attacks.\"}]\n45:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The MDI deployment surface included:\"}]\n46:[\"$\",\"$L5b\",null,{\"as\":\"ul\",\"children\":[\"\\n\",[\"$\",\"$L5c\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Domain controllers (all 12)\"}],\"\\n\",[\"$\",\"$L5c\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"AD FS servers (4)\"}],\"\\n\",[\"$\",\"$L5c\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"ADFS proxy servers (2)\"}],\"\\n\",[\"$\",\"$L5c\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Entra ID Connect servers (2)\"}],\"\\n\"]}]\n47:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Within 48 hours of activation, MDI flagged a password spray attack that had been running against the ADFS proxy for three days — below the threshold to trigger alerts but visible in the timeline view. We'd have missed it without MDI.\"}]\n48:[\"$\",\"$L2b\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"cloud-security-defender-for-cloud-apps\",\"children\":\"Cloud Security: Defender for Cloud Apps\"}]\n49:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Months 8-15 covered the cloud security workstream. The organization had moved significant workloads to Azure and Microsoft"])</script><script>self.__next_f.push([1," 365, but had no CASB visibility or data loss prevention.\"}]\n4a:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"We deployed Defender for Cloud Apps with:\"}]\n4b:[\"$\",\"$L5b\",null,{\"as\":\"ul\",\"children\":[\"\\n\",[\"$\",\"$L5c\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"App discovery for Shadow IT (found 47 unauthorized SaaS apps in use)\"}],\"\\n\",[\"$\",\"$L5c\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"OAuth app consent policies\"}],\"\\n\",[\"$\",\"$L5c\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"DLP policies for sensitive data classification\"}],\"\\n\",[\"$\",\"$L5c\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":\"Session policies for high-risk OAuth apps\"}],\"\\n\"]}]\n4c:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The app discovery finding was the surprise of the program. 47 unauthorized apps included three cloud storage services, two project management tools, and one social media management platform — all in use by various teams without IT approval. The legal risk of that exposure would have been significant without MDI alerting us.\"}]\n4d:[\"$\",\"$L2b\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"monitoring-sentinel-integration\",\"children\":\"Monitoring: Sentinel Integration\"}]\n4e:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"The final workstream was SOC integration — getting all the signals into Sentinel and writing playbooks that actually reduced alert fatigue.\"}]\n4f:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"We had 340 alerts at program start. After tuning, we got to 45 actionable alerts with defined playbooks. The key was ruthless prioritization: anything that couldn't result in a decision within 5 minutes went to the \\\"monitor and review\\\" bucket, not the \\\"SOC immediate\\\" bucket.\"}]\n50:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":\"Playbook highlights:\"}]\n51:[\"$\",\"$L5b\",null,{\"as\":\"ul\",\"children\":[\"\\n\",[\"$\",\"$L5c\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Lateral movement detection\"}],\": MDI + Sentinel correlation for NTLM relay patterns\"]}],\"\\n\",[\"$\",\"$L5c\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Ransomware precursor detection\"}],\": flagged mass file deletion + anomalous process launch\"]}],\"\\n\",[\"$\",\"$L5c\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Insider risk indicators\"}],\": unusual SharePoint download patterns triggering DLP escalation\"]}],\"\\n\",[\"$\",\"$L5c\",null,{\"marginTop\":\"4\",\"marginBottom\":\"8\",\"style\":{\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Entra sign-in anomaly response\"}],\": automated block for high-risk sign-ins with SOC notification\"]}],\"\\n\"]}]\n52:[\"$\",\"$L2b\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"what-i-d-do-differently\",\"children\":\"What I'd Do Differently\"}]\n53:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Start with identity regardless.\"}],\" If I could redo the program, I'd have pushed Entra ID govern"])</script><script>self.__next_f.push([1,"ance and CA policies even earlier. The identity signal is the most reliable indicator across all the other workstreams — you can do microsegmentation, device compliance, and cloud access all faster if you have strong identity controls as the foundation.\"]}]\n54:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Build the exception management process before writing policies.\"}],\" We invented the process as we went, which meant inconsistent handling of exceptions early on. A formal exception register with SLAs for remediation would have been cleaner.\"]}]\n55:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Get OT/IoT onboarded to network monitoring earlier.\"}],\" We waited until months 9-12 for OT segmentation because we thought we needed all the identity and endpoint work done first. We were wrong. We had blind spots in OT that we didn't know about until a passive OT monitoring tool showed up in month 8.\"]}]\n56:[\"$\",\"span\",null,{\"className\":\"font-body font-default font-m neutral-on-background-medium mt-8 mb-12\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\",\"lineHeight\":\"175%\"},\"children\":[[\"$\",\"strong\",null,{\"children\":\"Include a tabletop exercise for the SOC before deploying MDE.\"}],\" We tuned the alerts in isolation but didn't test the response playbooks until after deployment. Some of the playbook logic had gaps that would have caused delays in a real incident.\"]}]\n57:[\"$\",\"$L2b\",null,{\"marginTop\":\"24\",\"marginBottom\":\"12\",\"as\":\"h2\",\"id\":\"the-numbers\",\"children\":\"The Numbers\"}]\n"])</script><script>self.__next_f.push([1,"58:[\"$\",\"table\",null,{\"marginTop\":\"12\",\"marginBottom\":\"12\",\"style\":{\"width\":\"100%\",\"borderCollapse\":\"collapse\",\"fontSize\":\"0.875rem\",\"lineHeight\":\"1.75\"},\"children\":[[\"$\",\"thead\",null,{\"style\":{\"borderBottom\":\"1px solid var(--neutral-alpha-medium)\",\"backgroundColor\":\"var(--neutral-alpha-soft)\"},\"children\":[\"$\",\"tr\",null,{\"style\":{\"borderBottom\":\"1px solid var(--neutral-alpha-small)\"},\"children\":[[\"$\",\"th\",null,{\"style\":{\"padding\":\"8px 12px\",\"textAlign\":\"left\",\"fontWeight\":\"600\"},\"children\":\"Metric\"}],[\"$\",\"th\",null,{\"style\":{\"padding\":\"8px 12px\",\"textAlign\":\"left\",\"fontWeight\":\"600\"},\"children\":\"Start\"}],[\"$\",\"th\",null,{\"style\":{\"padding\":\"8px 12px\",\"textAlign\":\"left\",\"fontWeight\":\"600\"},\"children\":\"End\"}]]}]}],[\"$\",\"tbody\",null,{\"children\":[[\"$\",\"tr\",null,{\"style\":{\"borderBottom\":\"1px solid var(--neutral-alpha-small)\"},\"children\":[[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"Endpoints with MDE\"}],[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"0%\"}],[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"96%\"}]]}],[\"$\",\"tr\",null,{\"style\":{\"borderBottom\":\"1px solid var(--neutral-alpha-small)\"},\"children\":[[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"Devices Intune-compliant\"}],[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"12%\"}],[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"89%\"}]]}],[\"$\",\"tr\",null,{\"style\":{\"borderBottom\":\"1px solid var(--neutral-alpha-small)\"},\"children\":[[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"Conditional Access policies\"}],[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"0\"}],[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"47\"}]]}],[\"$\",\"tr\",null,{\"style\":{\"borderBottom\":\"1px solid var(--neutral-alpha-small)\"},\"children\":[[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"Legacy auth attempts blocked\"}],[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"—\"}],[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"14,000/month\"}]]}],[\"$\",\"tr\",null,{\"style\":{\"borderBottom\":\"1px solid var(--neutral-alpha-small)\"},\"children\":[[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"Unauthorized SaaS apps discovered\"}],[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"47\"}],[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"0 (quarantined)\"}]]}],[\"$\",\"tr\",null,{\"style\":{\"borderBottom\":\"1px solid var(--neutral-alpha-small)\"},\"children\":[[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"MDI alerts in SOC queue\"}],[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"340\"}],[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"45\"}]]}],[\"$\",\"tr\",null,{\"style\":{\"borderBottom\":\"1px solid var(--neutral-alpha-small)\"},\"children\":[[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"Time to detect lateral movement\"}],[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"Unknown\"}],[\"$\",\"td\",null,{\"style\":{\"padding\":\"8px 12px\"},\"children\":\"\u003c 4 hours\"}]]}]]}]]}]\n"])</script><script>self.__next_f.push([1,"59:[\"$\",\"span\",null,{\"classNam
