name: Publish new blog post to social

on:
  push:
    branches: [main]
    paths:
      - 'src/app/blog/posts/**.mdx'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect new MDX posts
        id: detect
        uses: tj-actions/changed-files@v44
        with:
          files: src/app/blog/posts/**.mdx

      - name: Set up Bun
        if: steps.detect.outputs.added_files != ''
        uses: oven-sh/setup-bun@v2

      - name: Parse frontmatter and notify n8n
        if: steps.detect.outputs.added_files != '' && secrets.N8N_WEBHOOK_URL != ''
        env:
          N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}
          BASE_URL: https://rohi-lab.org
          ADDED_FILES: ${{ steps.detect.outputs.added_files }}
        run: |
          if [ -z "$N8N_WEBHOOK_URL" ]; then
            echo "N8N_WEBHOOK_URL not set — skipping social notify"
            exit 0
          fi
          for file in $ADDED_FILES; do
            echo "Processing $file"
            payload=$(bun .github/scripts/parse-frontmatter.ts "$file")
            echo "Payload: $payload"
            curl -s -X POST "$N8N_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "$payload"
          done

