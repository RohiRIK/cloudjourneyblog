",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/8ac4e8555f09f41a.js\"],\"default\"]\n15:I[168027,[],\"default\"]\n:HL[\"/_next/static/chunks/93ac2d54f71ec8d4.css\",\"style\"]\n:HL[\"/_next/static/chunks/d20e0f0702cef329.css\",\"style\"]\n:HL[\"/_next/static/chunks/3a1b43107ae24619.css\",\"style\"]\n:HL[\"/_next/static/chunks/eef662fdc50843a7.css\",\"style\"]\n:HL[\"/_next/static/chunks/b3a7f4834154c9dc.css\",\"style\"]\n:HL[\"/_next/static/media/797e433ab948586e-s.p.dbea232f.woff2\",\"font\",{\"crossOrigin\":\"\",\"type\":\"font/woff2\"}]\n:HL[\"/_next/static/media/caa3a2e1cccd8315-s.p.853070df.woff2\",\"font\",{\"crossOrigin\":\"\",\"type\":\"font/woff2\"}]\nc:T1842,"])</script><script>self.__next_f.push([1,"\nWe spent three years rolling out Zero Trust at a defense technology company. 57 tasks later, here's what actually worked — and what broke in production.\n\n## The Implementation Sequence\n\nZero Trust isn't a product you buy. It's a sequence of controls you enforce, in order, with each phase creating the foundation for the next.\n\n### Phase 1: Emergency Access \u0026 Monitoring Foundation\n\nBefore touching anything else, you need:\n\n- **Breakglass accounts** — Named emergency accounts that bypass all Conditional Access. Don't use these daily. Test them quarterly.\n- **Alerting baseline** — What does normal look like? Capture login patterns, device health, app usage before you start blocking.\n\nThis is the unsexy phase that saves you when Phase 3 locks everyone out.\n\n### Phase 2: Security Info Registration\n\nBefore enforcing MFA, users need to register authentication methods. Set this up first:\n- **Auth methods policy** — Enable Microsoft Authenticator, FIDO2, Windows Hello for Business\n- **Temporary Access Pass** — One-time codes for users who lose hardware keys\n- **Report-only mode** — Test CA policies before enforcing\n\n### Phase 3: Block Legacy Authentication\n\nLegacy auth (SMTP auth, basic auth, POP/IMAP) is the attack surface. Block it:\n\n```\nConditional Access \u003e Assignments \u003e Cloud apps \u003e All apps\nConditions \u003e Client apps \u003e Select Exchange ActiveSync clients and Other clients\nControls \u003e Grant \u003e Block access\n```\n\nBlock legacy auth too early and you'll break:\n- Legacy application integrations\n- Service accounts with password auth only\n- Old MFA integrations that sit behind legacy protocols\n\n**What broke first:** SMTP-authenticated printer scanning and IoT device integrations. Both used basic auth with no modern auth path.\n\n### Phase 3: MFA Enforcement\n\nPhishing-resistant MFA is the goal. FIDO2 hardware keys. But hardware keys have procurement and onboarding friction:\n\n- Procurement: Buy 50 keys, distribute to Tier-1 roles (privileged users, admins)\n- Onboarding: Users need to register in-browser with Chrome/Edge (Firefox support is spotty)\n- Policy: Require phishing-resistant MFA for admin roles; offer standard MFA as fallback for general users\n\n**What broke first:** Users who lost their hardware keys. Registration flow required a new key + backup key, and the process times out fast.\n\n### Phase 4: Device Compliance (Intune Baselines)\n\nIntune security baselines + Conditional Access is where device trust lives:\n\n- **Windows baseline** — BitLocker, Windows Defender, firewall rules\n- **Device compliance policy** — Require Microsoft Entra hybrid joined OR compliant device\n- **MDE integration** — Device risk from Defender feeds CA decisions\n\n**What broke first:** Microsoft Entra hybrid join fails when:\n- Stale device objects in on-prem AD aren't cleaned up\n- Line-of-business apps still query on-prem AD only (no cloud auth path)\n- Users are co-managed (Intune + SCCM) and the policy boundary isn't clear\n\n### Phase 5: Session Controls\n\nSign-in frequency and device restrictions for existing sessions:\n- **Sign-in frequency** — Re-authenticate after X hours or when device state changes\n- **Persistent browser** — Block to prevent session cookie replay\n- **App-enforced restrictions** — Disable clipboard/file copy for unmanaged devices\n\n### Phase 6: Risk-Based Conditional Access\n\nIdentity Protection risk signals drive dynamic policies:\n\n- **High-risk sign-in** — Block or require MFA\n- **Risky user** — Force password reset\n- **Microsoft Defender for Identity** — Detect lateral movement, privilege escalation, and domain escalation attacks\n\n**What broke first:** False positives. Risky sign-in policies flagged VPN users on corporate devices because the sign-in location didn't match.\n\n### Phase 7: Network Segmentation (802.1X)\n\nWiFi authentication via 802.1X (WPA2-Enterprise) is network-level Zero Trust:\n\n- **EAP method** — EAP-TLS with certificate-based auth (vs. EAP-PEAP/MSCHAPv2)\n- **Certificate lifecycle** — SCEP or PKCS certificate profile from Intune\n- **Fallback** — WPA2-PSK for legacy devices that can't do 802.1X\n\n**What broke first:** EAP negotiation failures. Root causes:\n- Wrong EAP type configured on client vs. RADIUS\n- Server certificate missing trusted root on client\n- Server name validation mismatch (certificate SAN doesn't match RADIUS hostname)\n- Expired or revoked client/server certificates\n\n## What Actually Broke First\n\nAfter three years, here's the friction ranking:\n\n| Friction Point | Phase | Symptom |\n|---|---|---|\n| 802.1X EAP failures | Network | Users can't connect to WiFi; RADIUS shows method mismatch |\n| Device baseline conflicts | Device | Co-managed devices have conflicting policies from SCCM and Intune |\n| Legacy app breakage | Identity | LOB apps fail when legacy auth is blocked |\n| False-positive risky sign-ins | Identity | VPN users flagged as risky based on location |\n| Hardware key loss | MFA | Users lose keys, no backup, lockout |\n| Breakglass account lockout | Foundation | Breakglass account passwords expire or are not tested |\n\n## The Hard Lessons\n\n1. **Don't start with blocking.** Start with alerting and monitoring. Baseline normal before you break normal.\n\n2. **Phased enforcement, not big bang.** Each phase enables the next. Block legacy auth → enforce MFA → require device compliance → apply risk-based access.\n\n3. **802.1X is the hardest network control.** Budget double the time for 802.1X pilot. EAP-TLS certificate validation is where it fails.\n\n4. **Device trust requires clear ownership.** If you're co-managed (SCCM + Intune), define the boundary. We used Intune for cloud-native devices, SCCM for remaining on-prem managed.\n\n5. **Governance is the bottleneck.** Zero Trust fails when cross-team ownership isn't clear. Identity owns CA policies. Endpoint owns device baselines. Network owns 802.1X. Security owns MDI.\n\n## The Takeaway\n\nZero Trust isn't a project with an end date. It's an operational posture. The sequence matters: emergency access → security info registration → legacy block → MFA → device compliance → session controls → risk-based access → 802.1X.\n\nThe only thing that broke irreparably was when we tried to skip Phase 1."])</script><script>self.__next_f.push([1,"0:{\"P\":null,\"b\":\"wnzvGB6vganHRs-4gZi-e\",\"c\":[\"\",\"\"],\"q\":\"\",\"i\":false,\"f\":[[[\"\",{\"children\":[\"__PAGE__\",{}]},\"$undefined\",\"$undefined\",true],[[\"$\",\"$1\",\"c\",{\"children\":[[[\"$\",\"link\",\"0\",{\"rel\":\"stylesheet\",\"href\":\"/_next/static/chunks/93ac2d54f71ec8d4.css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\",\"nonce\":\"$undefined\"}],[\"$\",\"link\",\"1\",{\"rel\":\"stylesheet\",\"href\":\"/_next/static/chunks/d20e0f0702cef329.css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\",\"nonce\":\"$undefined\"}],[\"$\",\"link\",\"2\",{\"rel\":\"stylesheet\",\"href\":\"/_next/static/chunks/3a1b43107ae24619.css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\",\"nonce\":\"$undefined\"}],[\"$\",\"link\",\"3\",{\"rel\":\"stylesheet\",\"href\ 079049d5abbbd3d.js\",\"/_next/static/chunks/8ac4e8555f09f41a.js\"],\"RouteGuard\"]\n16:T1e4d,"])</script><script>self.__next_f.push([1,"\nYour users have personal Gmail accounts open on their work machines. They're checking personal email alongside Google Workspace. They're sharing work documents from personal Drive. IT has no visibility, no DLP, no audit trail.\n\nThis is the shadow IT problem. You can't just block personal Gmail at the network level without breaking something. But you can make it unusable for work purposes — and that's what this post covers.\n\n## The Problem: Shadow IT in Google Workspace\n\nEvery organization has it: users who default to personal accounts for convenience. Personal Gmail on work devices. Personal Drive for sharing. Personal Calendar for everything.\n\nThe risks:\n- **No DLP** — Company data leaves to personal accounts with no controls\n- **No audit trail** — You can't investigate a data leak if you don't know it happened\n- **No lifecycle** — When they leave, access to work data persists in their personal account\n- **Compliance risk** — Often noncompliant with internal policy and regulated data-handling requirements\n\nThe goal: make personal Gmail unusable for work purposes without breaking legitimate personal use on personal devices.\n\n## How CASB Fits In\n\nCASB (Cloud Access Security Broker) sits between your users and cloud services, providing:\n- **Visibility** — What cloud apps are being used?\n- **Data protection** — DLP policies applied to cloud traffic\n- **Threat protection** — Anomaly detection for cloud usage\n- **Access control** — Block or restrict based on context\n\nGoogle Workspace integrates with CASB via API, not inline proxy. Google explicitly recommends API/offline CASB patterns over inline proxies — inline CASBs exist but aren't the preferred path. For most orgs, Google-native controls (DLP, Reports API, App Access Management) cover much of what you need before considering third-party CASB.\n\n### Shadow IT Discovery\n\nBefore you can block, you need to know what you're dealing with. The CASB (or Google Workspace audit logs) reveals:\n\n- **OAuth token inventory** — Which third-party apps have user-authorized access to their Google data\n- **Login activity** — Where are users authenticating from?\n- **Drive sharing** — What's being shared externally?\n- **App usage** — Which apps are accessing Google Workspace data?\n\nIn Google Workspace Admin console, go to Security \u003e API controls \u003e Access management. Review OAuth app entries — check ownership (Google-owned/internal/third-party), requested scopes, and user count. The CASB dashboard often surfaces this more visually.\n\nApps are categorized as **Trusted** (full access), **Limited** (specific Google data only), **Blocked** (no access), or the default for unconfigured apps. Mark unknown third-party apps as Blocked after reviewing scope and ownership.\n\n## The Migration Strategy\n\n### Phase 1: Discover and Categorize\n\nList every external app accessing your users' Google data. Categorize:\n- **Approved** — IT-sanctioned, security reviewed\n- **Tolerated** — Not ideal but not blocked yet\n- **Blocked** — Shadow IT, must go\n\nThe CASB dashboard usually provides this. If not, export audit logs and pivot in Excel.\n\n### Phase 2: Offer a Better Alternative\n\nUsers go to personal Gmail because the sanctioned option isn't convenient. Fix that:\n\n- **Google Workspace** — If you don't have it, get it. Every user gets company @company.com account.\n- **Shared drives** — Centralize file storage so personal Drive isn't needed\n- **SSO** — Single sign-on from Entra ID to Google Workspace removes the password burden\n\n### Phase 3: Enforce with Policy\n\nNow block. The enforcement stack, in order of impact:\n\n**1. Block personal Google accounts** — This is what actually makes personal Gmail unusable on managed devices. Configure via proxy: `X-GoogApps-Allowed-Domains: yourdomain.com`, or in Google Admin console \u003e Security \u003e Managed browser \u003e Restrict sign-in to managed accounts. This stops users from adding their personal @gmail.com account to Chrome or signing into personal Gmail on managed machines.\n\n**2. App Access Control** — In Security \u003e API controls \u003e Access management, configure apps as Trusted / Limited / Specific Google data / Blocked. This controls OAuth grants, not browser access. Set default to Blocked for unconfigured apps if you want zero tolerance.\n\n**3. Context-Aware Access** — Verify managed device before granting access to Workspace apps. Requires Endpoint Verification on desktop; mobile uses Google endpoint management (Intune, Jamf, etc.) for device signals.\n\n### Phase 4: Data Migration\n\nFor users with existing personal Gmail data that needs to come over:\n\n1. **Data import** — Admin imports personal Gmail to corporate account via Security \u003e Data export and management \u003e Data migration. Requires user authorization — they authorize their personal Gmail access. This isn't the \"Google Workspace Migrate\" tool (that's for Exchange migrations).\n2. **Takeout** — User exports personal Drive, admin migrates to Shared Drive\n3. **Calendar migration** — User exports from personal calendar, imports to corporate or shares calendar with corporate account\n\nThis takes time. Give users 30 days to migrate, then enforce.\n\n## The Enforcement Checklist\n\n| Control | Implementation | Effect |\n|---|---|---|\n| Consumer account block | X-GoogApps-Allowed-Domains header or managed browser sign-in restriction | Personal Gmail can't sign in on managed devices |\n| App Access Control | Set apps to Trusted / Limited / Blocked; default to Blocked for unconfigured | No unapproved OAuth apps |\n| Context-Aware Access | Require managed device (desktop: Endpoint Verification; mobile: endpoint management) | Unmanaged devices blocked |\n| Drive external sharing | Allowlist or trust rules for external sharing | No uncontrolled file sharing |\n| SSO | Entra ID to Google Workspace | One identity, one credential |\n\n**CAA rollout tip:** Start in **monitor mode** first. Block only after verifying compliant devices sync Endpoint Verification — Google docs warn that sync delays can incorrectly block compliant desktops.\n\n## What Actually Breaks First\n\nIn practice, this enforcement breaks these workflows:\n\n1. **User's personal phone** — They can't check corporate email on their personal Android/iOS without management installed. Solution: offer MDM enrollment or accept the limitation.\n\n2. **Third-party tools** — Users who authorized random SaaS apps lose access. Solution: pre-approve the most common ones (Zoom, Slack, etc.).\n\n3. **Contractors** — External users without managed devices. Solution: dedicated contractor accounts with limited access, or accept unmanaged access with increased monitoring.\n\n4. **Endpoint Verification sync delays** — Compliant desktops get blocked before they sync device status. Google's docs explicitly warn about this. Run in monitor mode first.\n\n5. **OAuth restrictions break integrations fast** — Zoom, Slack, calendaring add-ons, scanners, backup tools — all need explicit app access configuration or users lose functionality.\n\n6. **Delegated mailbox access** — Consumer account blocking with `X-GoogApps-Allowed-Domains` can break delegated mailbox access if the delegate's domain isn't in allowed headers.\n\n## The Takeaway\n\nYou can't uninvent personal Gmail. Your users will always have personal accounts. What you can do is make it operationally useless for work:\n\n- DLP policies block data exfiltration\n- Context-Aware Access restricts access to managed devices\n- SSO removes the password management burden\n- Structured migration moves existing data to corporate\n\nThe goal isn't to punish users who use personal accounts. It's to make the corporate alternative so seamless that personal use becomes friction for work purposes, not the other way around."])</script><script>self.__next_f.push([1,"d:[\"$\",\"$Lb\",\"gcp-casb-shadow-it-migration\",{\"post\":{\"metadata\":{\"title\":\"Forcing the Shadow IT Migration: Making Personal Gmail Unusable in a Managed Network\",\"subtitle\":\"\",\"publishedAt\":\"2026-04-28\",\"summary\":\"Personal Gmail inside your corporate network isn't just a compliance risk — it's a data leak waiting to happen. Here's how to use CASB policies, Context-Aware Access, and structured migration to make shadow IT unusable.\",\"image\":\"/images/blog/gcp-casb-shadow-it-migration.png\",\"images\":[],\"tag\":\"Security\",\"team\":[],\"link\":\"\"},\"slug\":\"gcp-casb-shadow-it-migration\",\"content\":\"$16\"},\"thumbnail\":false,\"direction\":\"$undefined\"}]\n17:T1816,"])</script><script>self.__next_f.push([1,"\nFederating Google Workspace to Entra ID sounds straightforward — flip the switch in the admin console and suddenly your users sign in with Entra credentials. The reality is more nuanced. Here's what actually happens and how to get it right.\n\n## Why Federate at All\n\nThe value isn't just SSO. It's consolidating your identity authority. When Entra is the IdP:\n\n- **One identity** — Users exist in Entra, authenticate to Entra, access Google Workspace. No separate Google password to manage.\n- **Conditional Access** — You can apply Entra CA policies before letting users into Google. MFA requirements, session limits, risk-based access — all enforced before Google sees the request.\n- **Lifecycle** — When a user leaves Entra, they can't access Google. No orphaned accounts.\n\nThe alternative — local Google passwords with no Entra visibility — is the risk you're removing.\n\n## The Architecture\n\nTwo systems, one federation contract:\n\n```\nUser → Google Workspace (SP) → Entra ID (IdP) → SAML Response → User in Google\n```\n\n- **Entra ID** acts as the SAML Identity Provider\n- **Google Workspace** acts as the Service Consumer (via Federated Directory)\n- The glue is SAML 2.0 — standard, well-documented, but picky about configuration\n\nThe flow:\n\n1. User visits `mail.google.com` or any Google property\n2. Google detects federated domain, redirects to Entra with SAML AuthnRequest\n3. Entra prompts for authentication (password + MFA if configured)\n4. Entra returns SAML Assertion with user identity claims\n5. Google validates assertion, creates session, user lands in Google Workspace\n\nTwo flows exist: SP-initiated (user starts at Google) and IdP-initiated (user starts at Entra, gets redirected to Google). Both work post-setup.\n\n## The Setup Steps\n\n### 1. Prepare Your Domains\n\nConfirm both domains are verified in their respective consoles:\n- In Entra, your primary domain must be verified\n- In Google Admin, your domain must be listed\n\n### 2. Create the Enterprise App in Entra\n\nIn Entra ID admin center:\n- Add app \u003e Google Workspace (from the gallery)\n- Set up SSO \u003e SAML\n- **Important**: You'll populate this with values from Google in the next step — don't guess the endpoints.\n\n### 3. Configure Google SSO Profile\n\nIn Google Admin \u003e Security \u003e Authentication \u003e SSO with third-party IdP:\n- Create a new SSO profile (or use the preconfigured Microsoft Entra profile if available)\n- Copy these values from Google to Entra:\n  - **Entity ID** (from Google)\n  - **ACS URL** (from Google)\n- Then populate Entra with:\n  - **IdP Login URL**: Your Entra SSO URL\n  - **IdP Logout URL**: Your Entra logout URL\n  - **IdP Certificate**: Upload the Entra signing certificate\n\nAssign the app to pilot users/groups.\n\n### 4. Claims Mapping\n\nEntra sends these claims to Google:\n\n| Entra Claim | Google Field |\n|---|---|\n| email | Primary email |\n| givenName | First name |\n| surname | Last name |\n| NameID | Must match Google user's primary email |\n\nThe critical mapping: **NameID must match the user's primary email address in Google**. If it doesn't, sign-in fails.\n\n### 5. Provisioning (Optional But Recommended)\n\nFederation handles **authentication** — it doesn't create Google accounts. Users must exist in Google Workspace to sign in.\n\nTwo paths:\n- **Manual**: Pre-create users in Google before they authenticate\n- **Automatic**: Enable Entra provisioning to Google (via Entra ID \u003e Google app \u003e Provisioning). This syncs users from Entra to Google — create, update, disable — on a regular schedule.\n\nMost production deployments enable automatic provisioning to keep Google accounts in sync with Entra. Without it, you must manually create users in Google before they can sign in.\n\n## What Breaks First\n\n### NameID/Email Mismatch\n\nThe most common error post-setup: authentication fails at Google because the NameID claim doesn't match the user's primary email in Google.\n\nFix: Ensure the email claim from Entra matches exactly what's in the Google user's profile.\n\n### Wrong ACS or Entity ID\n\nIf the SAML endpoints are mismatched between Entra and Google, the assertion gets rejected.\n\nFix: Verify Google provides the correct ACS URL and Entity ID, and those are exactly what's configured in Entra.\n\n### Certificate Expiration\n\nEntra's SAML signing certificate expires Yearly (check your app's certificate expiry). Put a calendar reminder 30 days before. When it expires, users can't sign in until you update the certificate in Google admin.\n\n### User Not Provisioned\n\nIf a user exists in Entra but not in Google, and provisioning is disabled, authentication fails.\n\nFix: Enable automatic provisioning, or manually create users in Google before they attempt to sign in.\n\n### Not Assigned to App\n\nSometimes forgotten: the user or their group isn't assigned to the Google app in Entra.\n\nFix: Assign the app to the pilot group in Entra \u003e Enterprise App \u003e Assignments.\n\n## The Auth Flow in Plain English\n\n```\nBrowser starts at mail.google.com \n    ↓\nGoogle sees federated domain, redirects (SAML AuthnRequest) to Entra\n    ↓\nUser enters credentials at Entra (MFA triggers here if enabled)\n    ↓\nEntra validates, issues SAML Assertion with email + name + ImmutableId\n    ↓\nGoogle receives assertion, matches ImmutableId to Google user, logs in\n```\n\nThe key insight: the user never enters a Google password. Entra owns the credential entry, password complexity, MFA enforcement. Google just trusts Entra's assertion.\n\n## What You Gain\n\n| Before Federation | After Federation |\n|---|---|---|\n| Users manage Google passwords separately | Single Entra password |\n| No Entra visibility into Google access | CA policies apply before Google |\n| Orphaned Google accounts on leavers | Access cuts off when Entra disables |\n| No unified session policy | Entra controls session lifetime |\n\n## The Takeaway\n\nThe setup isn't hard — it's exacting. Get the SAML metadata right, map ImmutableId correctly, enable provisioning, and test both SP and IdP flows. Once federated, you've moved the authentication authority to Entra and consolidated your identity stack.\n\nDon't skip the test phase. Try it with one pilot user before rolling it out domain-wide."])</script><script>self.__next_f.push([1,"e:[\"$\",\"$Lb\",\"google-workspace-entra-federation\",{\"post\":{\"metadata\":{\"title\":\"Google Workspace to Entra ID Federation: The SSO Setup That Actually Works\",\"subtitle\":\"\",\"publishedAt\":\"2026-04-27\",\"summary\":\"Setting up Google Workspace to use Entra ID as the Identity Provider isn't just checking a box. Here's the practical walkthrough of SAML federation, claims mapping, and what breaks when you get it wrong.\",\"image\":\"/images/blog/google-workspace-entra-federation.png\",\"images\":[],\"tag\":\"Identity\",\"team\":[],\"link\":\"\"},\"slug\":\"google-workspace-entra-federation\",\"content\":\"$17\"},\"thumbnail\":false,\"direction\":\"$undefined\"}]\nf:[\"$\",\"$L6\",null,{\"fillWidth\":true,\"paddingLeft\":\"64\",\"horizontal\":\"end\",\"children\":[\"$\",\"$L9\",null,{\"maxWidth\":48}]}]\n19:T10a2,"])</script><script>self.__next_f.push([1,"\n## What it is\n\nA SOC assistant I built on my own time. The idea was simple: stop digging through documentation every time an alert fires and just ask a question in plain English.\n\nThe core is a RAG pipeline — Pinecone as the vector store, LangChain managing the retrieval and chains, Gemini 1.5 Pro doing the reasoning. It ingests security documentation, playbooks, and telemetry context, and surfaces relevant answers in seconds instead of minutes of manual searching.\n\nIt's not a product. It's a personal project that I run against real data and actually use.\n\n## Why I built it\n\nI work in security operations. A lot of the slow parts of alert triage aren't complex thinking — they're retrieval. Finding the right playbook, checking what a particular indicator means in this environment, confirming whether a behavior is expected for a given user. That's lookup work, and lookup work is exactly what RAG is good at.\n\nI wanted to see how much of that I could automate without the output becoming something you can't trust. That second part turned out to be the hard part.\n\n## How it works\n\n\u003cGrid columns=\"2\" gap=\"16\"\u003e\n    \u003cCard padding=\"16\" radius=\"m\"\u003e\n        \u003cIcon name=\"search\" size=\"s\" marginBottom=\"8\"/\u003e\n        \u003cText weight=\"bold\" marginBottom=\"4\"\u003eRetrieval\u003c/Text\u003e\n        \u003cText size=\"s\" onBackground=\"neutral-medium\"\u003eSecurity documentation and playbooks embedded into Pinecone. Queries pull the most relevant context before anything goes to the model.\u003c/Text\u003e\n    \u003c/Card\u003e\n    \u003cCard padding=\"16\" radius=\"m\"\u003e\n        \u003cIcon name=\"shield\" size=\"s\" marginBottom=\"8\"/\u003e\n        \u003cText weight=\"bold\" marginBottom=\"4\"\u003eReasoning\u003c/Text\u003e\n        \u003cText size=\"s\" onBackground=\"neutral-medium\"\u003eGemini 1.5 Pro handles the actual analysis — big context window matters here when you're passing in multiple documents at once.\u003c/Text\u003e\n    \u003c/Card\u003e\n    \u003cCard padding=\"16\" radius=\"m\"\u003e\n        \u003cIcon name=\"terminal\" size=\"s\" marginBottom=\"8\"/\u003e\n        \u003cText weight=\"bold\" marginBottom=\"4\"\u003eActions\u003c/Text\u003e\n        \u003cText size=\"s\" onBackground=\"neutral-medium\"\u003eHigh-confidence responses can trigger Logic Apps integrations — account isolation, ticket creation, analyst notification.\u003c/Text\u003e\n    \u003c/Card\u003e\n    \u003cCard padding=\"16\" radius=\"m\"\u003e\n        \u003cIcon name=\"openai\" size=\"s\" marginBottom=\"8\"/\u003e\n        \u003cText weight=\"bold\" marginBottom=\"4\"\u003eInterface\u003c/Text\u003e\n        \u003cText size=\"s\" onBackground=\"neutral-medium\"\u003ePlain English queries. Ask about an alert, a user, a behavior pattern — no structured query language needed.\u003c/Text\u003e\n    \u003c/Card\u003e\n\u003c/Grid\u003e\n\n## Stack\n\n- **Orchestration**: LangChain — manages retrieval chains and the agentic loop\n- **Model**: Google Gemini 1.5 Pro — large context window was the deciding factor over GPT-4\n- **Vector store**: Pinecone — low-latency retrieval at scale\n- **Integrations**: Microsoft Sentinel, Defender XDR, Azure Logic Apps\n\n## What actually worked\n\nThe retrieval speed was genuinely good from the start. Once the embeddings were in Pinecone, lookup latency was fast enough that the bottleneck shifted entirely to the model response time, which is what you want.\n\nThe natural language interface worked better than I expected for well-defined questions — \"what's the expected login behavior for this user?\", \"show me playbook steps for lateral movement detection\" — that kind of thing.\n\n## What didn't\n\nHallucination in forensic context is a real problem. Early versions would confidently answer questions that weren't well-represented in the retrieval results. I spent a significant amount of time tuning retrieval quality — chunk sizing, embedding strategy, score thresholds — before the answers were reliable enough to act on.\n\nI also initially tried to make it too autonomous. Fully automated playbook execution sounds useful until a false positive triggers an account lockdown at 2am. The current version flags high-confidence actions for one-click confirmation rather than running them silently.\n\n## Results (personal use)\n\nTriage time on familiar alert types dropped significantly — the lookup work that was eating 15-30 minutes now takes seconds. For novel or complex incidents I still do full manual investigation, which is the right call. The assistant is a first-pass filter, not a replacement for thinking.\n"])</script><script>self.__next_f.push([1,"10:[\"$\",\"$L3\",null,{\"fillWidth\":true,\"gap\":\"24\",\"marginBottom\":\"l\",\"children\":[[\"$\",\"$L6\",null,{\"fillWidth\":true,\"paddingRight\":\"64\",\"children\":[\"$\",\"$L9\",null,{\"maxWidth\":48}]}],[\"$\",\"$L6\",null,{\"fillWidth\":true,\"gap\":\"24\",\"marginTop\":\"40\",\"s\":{\"direction\":\"column\"},\"children\":[[\"$\",\"$L6\",null,{\"flex\":1,\"paddingLeft\":\"l\",\"paddingTop\":\"24\",\"children\":[\"$\",\"h2\",null,{\"className\":\"font-display font-strong font-xs neutral-on-background-strong\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"balance\"},\"children\":\"Things I've built\"}]}],[\"$\",\"$L6\",null,{\"flex\":3,\"paddingX\":\"20\",\"children\":[\"$\",\"$L3\",null,{\"fillWidth\":true,\"gap\":\"xl\",\"marginBottom\":\"40\",\"paddingX\":\"l\",\"children\":[[\"$\",\"$L18\",\"project-aegis\",{\"priority\":true,\"href\":\"/work/project-aegis\",\"images\":[],\"title\":\"Project Aegis\",\"description\":\"A personal RAG-based SOC assistant I built to answer security questions fast — powered by LangChain, Gemini, and a Pinecone vector store sitting on top of real security documentation.\",\"content\":\"$19\",\"avatars\":[],\"link\":\"https://github.com/RohiRIK/Project-Aegis\"}],\"$L1a\",\"$L1b\"]}]}]]}],\"$L1c\"]}]\n1 ound\"},\"dots\":{\"display\":true,\"opacity\":40,\"size\":\"2\",\"color\":\"brand-background-strong\"},\"grid\":{\"display\":false,\"opacity\":100,\"color\":\"neutral-alpha-medium\",\"width\":\"0.25rem\",\"height\":\"0.25rem\"},\"lines\":{\"display\":false,\"opacity\":100,\"size\":\"16\",\"thickness\":1,\"angle\":45,\"color\":\"neutral-alpha-weak\"}}]}],[\"$\",\"$L28\",null,{\"ref\":\"$undefined\",\"cursor\":\"$undefined\",\"xl\":\"$undefined\",\"l\":\"$undefined\",\"m\":\"$undefined\",\"s\":{\"hide\":true},\"xs\":\"$undefined\",\"style\":\"$undefined\",\"hide\":\"$undefined\",\"fillWidth\":true,\"minHeight\":\"16\"}],[\"$\",\"$L29\",null,{}],[\"$\",\"div\",null,{\"ref\":\"$undefined\",\"className\":\"display-flex position-relative p-l flex-1 justify-center min-width-0 fill-width \",\"style\":{\"maxWidth\":\"$undefined\",\"minWidth\":\"$undefined\",\"minHeight\":\"$undefined\",\"maxHeight\":\"$undefined\",\"width\":\"$undefined\",\"height\":\"$undefined\",\"aspectRatio\":\"$undefined\",\"textAlign\":\"$undefined\",\"cursor\":\"$undefined\"},\"children\":[\"$\",\"div\",null,{\"ref\":\"$undefined\",\"className\":\"display-flex position-relative justify-center min-width-0 fill-width \",\"style\":{\"maxWidth\":\"$undefined\",\"minWidth\":\"$undefined\",\"minHeight\":\"var(--static-space-0)\",\"maxHeight\":\"$undefined\",\"width\":\"$undefined\",\"height\":\"$undefined\",\"aspectRatio\":\"$undefined\",\"textAlign\":\"$undefined\",\"cursor\":\"$undefined\"},\"children\":[\"$\",\"$L2a\",null,{\"children\":\"$L2b\"}]}]}],\"$L2c\"]}]}]]}]\n"])</script><script>self.__next_f.push([1,"2f:I[339756,[\"/_next/static/chunks/d96012bcfc98706a.js\",\"/_next/static/chunks/73e3194f06db260e.js\"],\"default\"]\n30:I[837457,[\"/_next/static/chunks/d96012bcfc98706a.js\",\"/_next/static/chunks/73e3194f06db260e.js\"],\"default\"]\n31:I[298229,[\"/_next/static/chunks/703ea523df03f6b5.js\",\"/_next/static/chunks/8a07e6fd7e614a7b.js\",\"/_next/static/chunks/21f080b07a2c63d8.js\",\"/_next/static/chunks/0e235429b8fbdec6.js\",\"/_next/static/chunks/2079049d5abbbd3d.js\",\"/_next/static/chunks/8ac4e8555f09f41a.js\"],\"IconButton\"]\n2d:T749,"])</script><script>self.__next_f.push([1,"\n## What this was\n\nA client running JumpCloud for MDM wanted to consolidate onto the Microsoft stack. Everything else was already in Microsoft — identity, email, security — but the device management gap meant correlating device state with identity required jumping between platforms.\n\n## What I built\n\nThe main challenge with MDM migrations is the transition gap — the window where a device is unenrolled from one MDM and not yet in another. During that time you lose policy enforcement and visibility.\n\nI wrote PowerShell scripts to handle the transition in sequence: unenroll from JumpCloud, trigger Intune enrollment, verify the device showed up in Intune before moving to the next. Ran in batches with rollback checkpoints so we could pause if something broke mid-migration.\n\n**Windows Autopilot** — registered the Windows fleet into Autopilot for zero-touch future provisioning. Extracted hardware hashes, uploaded them, configured deployment profiles per user group.\n\n**macOS via Apple Business Manager** — set up ABM integration with Intune. More involved than Windows Autopilot — had to work through the MDM profile trust chain and handle devices that had supervision issues from the JumpCloud side.\n\n**Policy parity** — translated JumpCloud's Command Library into Intune Configuration Profiles and PowerShell scripts deployed via Intune. Some mapped cleanly, some needed rethinking.\n\n## What made it hard\n\nA subset of devices had been enrolled in JumpCloud via a method that left a persistent MDM profile the script couldn't cleanly remove. Those had to be handled manually. Also found several macOS devices enrolled by users personally rather than via ABM, which broke the supervision requirement for certain policies.\n\n## Stack\n\n- Microsoft Intune\n- JumpCloud\n- Windows Autopilot\n- Apple Business Manager\n- PowerShell \u0026 Microsoft Graph API\n"])</script><script>self.__next_f.push([1,"1a:[\"$\",\"$L18\",\"jumpcloud-to-intune-migration\",{\"priority\":true,\"href\":\"/work/jumpcloud-to-intune-migration\",\"images\":[],\"title\":\"JumpCloud to Intune Migration\",\"description\":\"MDM consolidation from JumpCloud to Microsoft Intune — automated unenrollment, Autopilot provisioning, and policy parity for a mixed Windows and macOS fleet.\",\"content\":\"$2d\",\"avatars\":[],\"link\":\"\"}]\n2e:T6db,"])</script><script>self.__next_f.push([1,"\n## What this was\n\nA client at Oncloud decided to move their entire identity and collaboration stack from Google Workspace to Microsoft 365. I was the lead engineer on the migration — responsible for technical execution from discovery through cutover.\n\n## What the work looked like\n\n**Identity migration** — mapped thousands of Google identities into a clean Entra ID tenant, standardized naming conventions, consolidated accounts that had duplicated from acquisitions. Set up SSO from scratch with Entra ID as the new IdP.\n\n**Data migration via AvePoint Fly** — handled mailbox and Google Drive to SharePoint/OneDrive transfer. The hard part wasn't the tool — it was the permission mapping. Google Drive's sharing model doesn't translate cleanly to SharePoint. Spent significant time building mapping rules to preserve access rather than just moving data and leaving people unable to open their files.\n\n**Mail cutover** — ran split-delivery during the transition so mail kept flowing to both platforms while users moved over. Managed the DNS cutover window to avoid gaps.\n\n**SSO re-mapping** — the client had 50+ SaaS applications pointed at Google as IdP. Reconfigured each for SAML/OIDC against Entra ID. Most were straightforward; a few needed custom attribute mappings.\n\n## What made it hard\n\nThe data migration took longer than scoped. The client's Google Drive was far messier than discovery suggested — deeply nested shared drives with complex permission inheritance, orphaned files, and accounts that no longer existed but still owned content. We had to build a pre-migration cleanup process that wasn't in the original plan.\n\n## Stack\n\n- AvePoint Fly\n- Microsoft Entra ID\n- Google Workspace APIs\n- Microsoft Graph API\n- PowerShell\n"])</script><script>self.__next_f.push([1,"1b:[\"$\",\"$L18\",\"gcp-to-entra-migration\",{\"priority\":false,\"href\":\"/work/gcp-to-entra-migration\",\"images\":[],\"title\":\"GCP to Entra ID Migration\",\"description\":\"Full identity and collaboration migration from Google Workspace to Microsoft 365 — mailboxes, Drive data, SSO re-mapping across 50+ apps, and tenant consolidation.\",\"content\":\"$2e\",\"avatars\":[],\"link\":\"\"}]\n1c:[\"$\",\"$L6\",null,{\"fillWidth\":true,\"paddingLeft\":\"64\",\"horizontal\":\"end\",\"children\":[\"$\",\"$L9\",null,{\"maxWidth\":48}]}]\n2b:[\"$\",\"$L2f\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L30\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":[[\"$\",\"$L3\",null,{\"as\":\"section\",\"fill\":true,\"center\":true,\"paddingBottom\":\"160\",\"children\":[[\"$\",\"span\",null,{\"className\":\"font-display font-strong font-xl mb-s\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":\"404\"}],[\"$\",\"h1\",null,{\"className\":\"font-display font-default font-xs neutral-on-background-strong mb-l\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"balance\"},\"children\":\"Page Not Found\"}],[\"$\",\"span\",null,{\"className\":\"neutral-on-background-weak\",\"style\":{\"textAlign\":\"$undefined\",\"textWrap\":\"$undefined\"},\"children\":\"The page you are looking for does not exist.\"}]]}],[]],\"forbidden\":\"$undefined\",\"unauthorized\":\"$undefined\"}]\n"])</script><script>self.__next_f.push([1,"2c:
